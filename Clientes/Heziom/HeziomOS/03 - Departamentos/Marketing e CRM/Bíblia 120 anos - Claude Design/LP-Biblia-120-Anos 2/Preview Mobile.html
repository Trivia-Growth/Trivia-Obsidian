<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview Mobile · Bíblia 120 Anos</title>
<style>
  :root { --phone-w: 390px; --phone-h: 844px; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background: radial-gradient(120% 90% at 50% 0%, #1A2029, #0B0E13);
    font-family: "Manrope", system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px 60px; gap: 26px;
  }
  .head { text-align: center; color: #ECE6D8; }
  .head .kicker {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: #E5B875; margin: 0 0 8px;
  }
  .head h1 {
    font-family: "Cormorant Garamond", Georgia, serif; font-weight: 500;
    font-size: 30px; margin: 0; letter-spacing: -0.01em;
  }
  .head p { color: #A7A595; font-size: 13.5px; margin: 8px 0 0; }

  .stage { display: flex; gap: 56px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }

  /* Moldura de celular */
  .phone {
    position: relative;
    width: calc(var(--phone-w) + 24px);
    height: calc(var(--phone-h) + 24px);
    background: linear-gradient(160deg, #2a2f38, #14181f);
    border-radius: 54px;
    padding: 12px;
    box-shadow: 0 50px 90px -30px rgba(0,0,0,0.8), inset 0 0 0 2px rgba(229,184,117,0.18);
  }
  .phone::before {
    content: ""; position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 26px; background: #0B0E13; border-radius: 0 0 16px 16px; z-index: 3;
  }
  .screen {
    width: var(--phone-w); height: var(--phone-h);
    border-radius: 42px; overflow: hidden; background: #fff; position: relative;
  }
  .screen iframe {
    width: var(--phone-w); height: var(--phone-h); border: 0; display: block;
  }
  .label {
    text-align: center; color: #A7A595; font-size: 12px; margin-top: 14px;
    font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.1em;
  }
  .note {
    max-width: 420px; color: #A7A595; font-size: 13px; line-height: 1.6; text-align: center;
  }
  .note a { color: #E5B875; }
  @media (max-width: 460px) {
    :root { --phone-w: 320px; --phone-h: 693px; }
  }
</style>
</head>
<body>
  <div class="head">
    <p class="kicker">Pré-visualização</p>
    <h1>Versão Mobile · LP 120 Anos</h1>
    <p>Mesma página, renderizada na largura de um celular (390&nbsp;px).</p>
  </div>

  <div class="stage">
    <div>
      <div class="phone">
        <div class="screen">
          <iframe src="index.html" title="LP Bíblia 120 Anos — mobile" scrolling="yes"></iframe>
        </div>
      </div>
      <p class="label">iPhone · 390 × 844</p>
    </div>
  </div>

  <p class="note">Role dentro da tela do celular para navegar pela página inteira. A LP oficial continua sendo <strong style="color:#ECE6D8">index.html</strong> — ela se adapta sozinha quando aberta em qualquer aparelho.</p>
</body>
</html>
