document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ef=\"#telas\" class=\"hover:text-orange transition\">Telas<\u002Fa>\n    <\u002Fdiv>\n    <a href=\"ui_kits/app/index.html\" class=\"inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-orange text-white text-[12.5px] font-bold hover:bg-orange-deep transition shadow-[0_2px_0_0_#C5590C]\">Abrir o produto →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<header class=\"relative overflow-hidden bg-navy-deep text-white\">\n  <img src=\"4c8153f1-35b2-439b-a7e4-b6bfa43f5ebc\" class=\"absolute -right-20 -bottom-28 w-[460px] opacity-[0.06] pointer-events-none\" alt=\"\">\n  <div class=\"absolute left-0 top-0 h-full w-1.5 bg-orange\"><\u002Fdiv>\n  <div class=\"max-w-[1080px] mx-auto px-6 py-20 relative\">\n    <img src=\"1aa7ffd5-2961-4187-b408-cb56da96e355\" class=\"h-9 mb-10\" alt=\"Sinérgica\">\n    <div class=\"flex items-center gap-2 mb-5\">\n      <span class=\"w-1.5 h-1.5 rounded-full bg-orange\"><\u002Fspan>\n      <span class=\"eyebrow text-amber\">Sistema Operacional · Manutenções Patrimoniais<\u002Fspan>\n    <\u002Fdiv>\n    <h1 class=\"font-brand font-bold text-[clamp(40px,6vw,68px)] leading-[1.02] max-w-3xl\">O design system do <span class=\"text-orange\">Sinérgica OS<\u002Fspan>.<\u002Fh1>\n    <p class=\"text-[16px] text-paper/60 mt-5 max-w-xl leading-relaxed\">Identidade, princípios, tokens, componentes e telas do sistema operacional que gerencia a manutenção predial da Sinérgica — direção <b class=\"text-paper/90\">industrial / instrumento de operação<\u002Fb>.<\u002Fp>\n    <div class=\"flex flex-wrap items-center gap-8 mt-12 font-brand\">\n      <div><div class=\"tnum text-[30px] font-bold\">9<\u002Fdiv><div class=\"text-[10px] tracking-[0.16em] uppercase text-paper/40 mt-1\">Módulos<\u002Fdiv><\u002Fdiv>\n      <div class=\"w-px h-9 bg-navy-line\"><\u002Fdiv>\n      <div><div class=\"tnum text-[30px] font-bold\">5<\u002Fdiv><div class=\"text-[10px] tracking-[0.16em] uppercase text-paper/40 mt-1\">Telas mockadas<\u002Fdiv><\u002Fdiv>\n      <div class=\"w-px h-9 bg-navy-line\"><\u002Fdiv>\n      <div><div class=\"tnum text-[30px] font-bold\">2<\u002Fdiv><div class=\"text-[10px] tracking-[0.16em] uppercase text-paper/40 mt-1\">Fontes · Saira + Poppins<\u002Fdiv><\u002Fdiv>\n      <div class=\"w-px h-9 bg-navy-line\"><\u002Fdiv>\n      <div><div class=\"tnum text-[30px] font-bold text-orange\">1<\u002Fdiv><div class=\"text-[10px] tracking-[0.16em] uppercase text-paper/40 mt-1\">Laranja cirúrgico<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main class=\"max-w-[1080px] mx-auto px-6 py-16 space-y-24\">\n\n  <!-- SÍMBOLO -->\n  <section id=\"simbolo\">\n    <div class=\"flex items-center gap-2.5 mb-2\"><span class=\"w-1 h-3.5 bg-orange rounded-sm\"><\u002Fspan><span class=\"eyebrow text-orange\">01 · A Marca<\u002Fspan><\u002Fdiv>\n    <h2 class=\"h2 text-[34px] text-navy mb-3\">O símbolo é um ciclo de manutenção.<\u002Fh2>\n    <p class=\"text-[15px] text-ink-2 max-w-2xl leading-relaxed mb-10\">A engrenagem com duas setas envolvendo um edifício resume o produto: <b>manutenção contínua que protege o patrimônio<\u002Fb>. Cada elemento tem leitura própria e vira recurso gráfico no sistema — marca-d'água, tile de app e infográfico de ciclo.<\u002Fp>\n    <div class=\"grid md:grid-cols-[320px_1fr] gap-8 items-center\">\n      <div class=\"relative bg-navy-deep rounded-xl p-10 flex items-center justify-center\">\n        <div class=\"absolute left-0 top-0 h-full w-1.5 bg-orange rounded-l-xl\"><\u002Fdiv>\n        <img src=\"5d63d395-35e9-40c8-9ff0-63265723de65\" class=\"w-44 h-44 object-contain\" alt=\"Símbolo Sinérgica\">\n      <\u002Fdiv>\n      <div class=\"grid sm:grid-cols-3 gap-4\">\n        <div class=\"bg-card border border-line rounded-lg p-4\"><div class=\"w-9 h-9 rounded-lg bg-orange-soft text-orange flex items-center justify-center mb-3\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 2v3m0 14v3m10-10h-3M5 12H2m15.5-6.5-2 2m-7 7-2 2m11 0-2-2m-7-7-2-2\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3.5\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div class=\"font-brand text-[13px] font-bold text-navy\">Engrenagem<\u002Fdiv><p class=\"text-[12px] text-ink-2 mt-1 leading-snug\">Operação, processo, PCM — o motor que mantém o prédio funcionando.<\u002Fp><\u002Fdiv>\n        <div class=\"bg-card border border-line rounded-lg p-4\"><div class=\"w-9 h-9 rounded-lg bg-orange-soft text-orange flex items-center justify-center mb-3\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M23 4v6h-6M1 20v-6h6\"><\u002Fpath><path d=\"M3.5 9a9 9 0 0 1 14.8-3.4L23 10M1 14l4.7 4.4A9 9 0 0 0 20.5 15\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div class=\"font-brand text-[13px] font-bold text-navy\">Setas / Ciclo<\u002Fdiv><p class=\"text-[12px] text-ink-2 mt-1 leading-snug\">Manutenção preventiva e contínua: inspeção → execução → validação.<\u002Fp><\u002Fdiv>\n        <div class=\"bg-card border border-line rounded-lg p-4\"><div class=\"w-9 h-9 rounded-lg bg-orange-soft text-orange flex items-center justify-center mb-3\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 21h18M5 21V8l7-5 7 5v13M9 21v-6h6v6\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div class=\"font-brand text-[13px] font-bold text-navy\">Edifício<\u002Fdiv><p class=\"text-[12px] text-ink-2 mt-1 leading-snug\">O patrimônio do síndico — o que o sistema existe para preservar.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- usos do símbolo -->\n    <h3 class=\"font-brand text-[13px] font-bold tracking-[0.1em] uppercase text-ink-3 mt-12 mb-4\">Usos no sistema<\u002Fh3>\n    <div class=\"grid sm:grid-cols-4 gap-4\">\n      <div class=\"rounded-lg overflow-hidden border border-line\"><div class=\"bg-navy-deep h-28 relative overflow-hidden flex items-end p-3\"><img src=\"4c8153f1-35b2-439b-a7e4-b6bfa43f5ebc\" class=\"absolute -right-6 -bottom-8 w-28 opacity-[0.09]\" alt=\"\"><span class=\"text-[11px] font-semibold text-paper/70 relative\">Marca-d'água<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"rounded-lg overflow-hidden border border-line\"><div class=\"bg-paper h-28 flex items-center justify-center\"><div class=\"w-12 h-12 rounded-lg bg-navy p-2.5\"><img src=\"4c8153f1-35b2-439b-a7e4-b6bfa43f5ebc\" class=\"w-full h-full object-contain\" alt=\"\"><\u002Fdiv><\u002Fdiv><div class=\"px-3 py-2 text-[11px] font-semibold text-ink-2 bg-card border-t border-line\">Tile / Avatar<\u002Fdiv><\u002Fdiv>\n      <div class=\"rounded-lg overflow-hidden border border-line\"><div class=\"bg-card h-28 flex items-center justify-center\"><img src=\"5d63d395-35e9-40c8-9ff0-63265723de65\" class=\"w-12 h-12 object-contain\" alt=\"\"><\u002Fdiv><div class=\"px-3 py-2 text-[11px] font-semibold text-ink-2 bg-card border-t border-line\">Favicon laranja<\u002Fdiv><\u002Fdiv>\n      <div class=\"rounded-lg overflow-hidden border border-line\"><div class=\"bg-orange h-28 flex items-center justify-center\"><img src=\"4c8153f1-35b2-439b-a7e4-b6bfa43f5ebc\" class=\"w-12 h-12 object-contain\" alt=\"\"><\u002Fdiv><div class=\"px-3 py-2 text-[11px] font-semibold text-ink-2 bg-card border-t border-line\">Sobre laranja<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- COR -->\n  <section id=\"cor\">\n    <div class=\"flex items-center gap-2.5 mb-2\"><span class=\"w-1 h-3.5 bg-orange rounded-sm\"><\u002Fspan><span class=\"eyebrow text-orange\">02 · Cor<\u002Fspan><\u002Fdiv>\n    <h2 class=\"h2 text-[34px] text-navy mb-3\">Navy estrutura. Laranja é cirúrgico.<\u002Fh2>\n    <p class=\"text-[15px] text-ink-2 max-w-2xl leading-relaxed mb-10\">O navy carrega a estrutura (sidebar, tinta, numerais). O laranja aparece <b>só<\u002Fb> onde precisa de energia: ação principal, item ativo, prioridade crítica e alerta. Sobre <b>papel quente<\u002Fb> — nunca o slate frio dos dashboards genéricos.<\u002Fp>\n\n    <!-- Gradiente da marca -->\n    <div class=\"rounded-xl overflow-hidden border border-line mb-8\">\n      <div class=\"h-24 flex items-end p-4\" style=\"background:linear-gradient(110deg,#EE7B22,#F8A634)\"><span class=\"font-brand text-[12px] font-bold text-white/90\">Gradiente da marca · 110° · #EE7B22 → #F8A634<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Rampa laranja -->\n    <h3 class=\"font-brand text-[13px] font-bold tracking-[0.1em] uppercase text-ink-3 mb-3\">Rampa Laranja <span class=\"text-ink-4 font-medium normal-case tracking-normal\">— ação, data-viz, profundidade<\u002Fspan><\u002Fh3>\n    <div class=\"grid grid-cols-5 sm:grid-cols-11 gap-1.5 mb-3\">\n      <div><div class=\"h-14 rounded-md border border-line\" style=\"background:#FDF1E6\"><\u002Fdiv><div class=\"text-[9px] font-brand tnum text-ink-3 mt-1 text-center\">50<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"h-14 rounded-md\" style=\"background:#FBE3CC\"><\u002Fdiv><div class=\"text-[9px] font-brand tnum text-ink-3 mt-1 text-center\">100<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"h-14 rounded-md\" style=\"background:#F7C79A\"><\u002Fdiv><div class=\"text-[9px] font-brand tnum text-ink-3 mt-1 text-center\">200<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"h-14 rounded-md\" style=\"background:#F3AB68\"><\u002Fdiv><div class=\"text-[9px] font-brand tnum text-ink-3 mt-1 text-center\">300<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"h-14 rounded-md\" style=\"background:#EF8F3B\"><\u002Fdiv><div class=\"text-[9px] font-brand tnum text-ink-3 mt-1 text-center\">400<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"h-14 rounded-md ring-2 ring-navy ring-offset-2 ring-offset-paper\" style=\"background:#E8731B\"><\u002Fdiv><div class=\"text-[9px] font-brand tnum text-navy font-bold mt-1 text-center\">500<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"h-14 rounded-md\" style=\"background:#D2630F\"><\u002Fdiv><div class=\"text-[9px] font-brand tnum text-ink-3 mt-1 text-center\">600<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"h-14 rounded-md\" style=\"background:#AE4F0C\"><\u002Fdiv><div class=\"text-[9px] font-brand tnum text-ink-3 mt-1 text-center\">700<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"h-14 rounded-md\" style=\"background:#8A3E0B\"><\u002Fdiv><div class=\"text-[9px] font-brand tnum text-ink-3 mt-1 text-center\">800<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"h-14 rounded-md\" style=\"background:#5E2A08\"><\u002Fdiv><div class=\"text-[9px] font-brand tnum text-ink-3 mt-1 text-center\">900<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"h-14 rounded-md\" style=\"background:#F4A300\"><\u002Fdiv><div class=\"text-[9px] font-brand tnum text-ink-3 mt-1 text-center\">amber<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"text-[12px] text-ink-3 mb-8\">Ação = <b class=\"text-orange\">500<\u002Fb> · hover = <b class=\"text-orange-600\">600<\u002Fb> · texto laranja = 700–900 · fundos de selo = 50–100.<\u002Fp>\n\n    <!-- Governança do laranja -->\n    <div class=\"grid sm:grid-cols-2 gap-4 mb-10\">\n      <div class=\"bg-card border border-line rounded-lg p-5\">\n        <div class=\"flex items-center gap-2 mb-3\"><span class=\"w-5 h-5 rounded-full bg-[#E7F6EC] text-[#1E8E45] flex items-center justify-center text-[12px] font-bold\">✓<\u002Fspan><span class=\"font-brand text-[12px] font-bold tracking-wide uppercase text-[#1E8E45]\">Use laranja em<\u002Fspan><\u002Fdiv>\n        <ul class=\"text-[13px] text-ink-2 space-y-1.5 leading-snug\">\n          <li>• Botão de ação principal (1 por bloco)<\u002Fli>\n          <li>• Indicador de item / aba ativa<\u002Fli>\n          <li>• Prioridade crítica e alta (GUT)<\u002Fli>\n          <li>• Linha-destaque em gráficos (SLA)<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"bg-card border border-line rounded-lg p-5\">\n        <div class=\"flex items-center gap-2 mb-3\"><span class=\"w-5 h-5 rounded-full bg-[#FCEAE8] text-[#C5362B] flex items-center justify-center text-[12px] font-bold\">✕<\u002Fspan><span class=\"font-brand text-[12px] font-bold tracking-wide uppercase text-[#C5362B]\">Evite laranja em<\u002Fspan><\u002Fdiv>\n        <ul class=\"text-[13px] text-ink-2 space-y-1.5 leading-snug\">\n          <li>• Preenchimentos decorativos amplos<\u002Fli>\n          <li>• Fundos de página ou de card<\u002Fli>\n          <li>• Vários botões laranja na mesma tela<\u002Fli>\n          <li>• Texto corrido (baixa legibilidade)<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Navy + neutros + semânticas -->\n    <div class=\"grid sm:grid-cols-4 gap-3\">\n      <div><div class=\"h-16 rounded-md\" style=\"background:#1C2748\"><\u002Fdiv><div class=\"text-[11px] font-semibold text-navy mt-1.5\">Navy<\u002Fdiv><div class=\"text-[10px] font-brand tnum text-ink-3\">#1C2748<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"h-16 rounded-md\" style=\"background:#141C36\"><\u002Fdiv><div class=\"text-[11px] font-semibold text-navy mt-1.5\">Navy Deep<\u002Fdiv><div class=\"text-[10px] font-brand tnum text-ink-3\">#141C36<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"h-16 rounded-md border border-line\" style=\"background:#F4F2EC\"><\u002Fdiv><div class=\"text-[11px] font-semibold text-navy mt-1.5\">Papel quente<\u002Fdiv><div class=\"text-[10px] font-brand tnum text-ink-3\">#F4F2EC<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"h-16 rounded-md border border-line\" style=\"background:#E5E2D9\"><\u002Fdiv><div class=\"text-[11px] font-semibold text-navy mt-1.5\">Hairline<\u002Fdiv><div class=\"text-[10px] font-brand tnum text-ink-3\">#E5E2D9<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <h3 class=\"font-brand text-[13px] font-bold tracking-[0.1em] uppercase text-ink-3 mt-8 mb-3\">Semânticas &amp; Prioridade GUT<\u002Fh3>\n    <div class=\"flex flex-wrap gap-2.5\">\n      <span class=\"inline-flex items-center gap-2 px-3 py-1.5 rounded-md bg-card border border-line text-[12px] font-semibold\"><span class=\"w-2.5 h-2.5 rounded-full\" style=\"background:#1E8E45\"><\u002Fspan>Concluído / no prazo<\u002Fspan>\n      <span class=\"inline-flex items-center gap-2 px-3 py-1.5 rounded-md bg-card border border-line text-[12px] font-semibold\"><span class=\"w-2.5 h-2.5 rounded-full\" style=\"background:#F4A300\"><\u002Fspan>Em andamento<\u002Fspan>\n      <span class=\"inline-flex items-center gap-2 px-3 py-1.5 rounded-md bg-card border border-line text-[12px] font-semibold\"><span class=\"w-2.5 h-2.5 rounded-full\" style=\"background:#2B375E\"><\u002Fspan>Planejado<\u002Fspan>\n      <span class=\"inline-flex items-center gap-2 px-3 py-1.5 rounded-md bg-card border border-line text-[12px] font-semibold\"><span class=\"w-2.5 h-2.5 rounded-full\" style=\"background:#D6362B\"><\u002Fspan>Crítica<\u002Fspan>\n      <span class=\"inline-flex items-center gap-2 px-3 py-1.5 rounded-md bg-card border border-line text-[12px] font-semibold\"><span class=\"w-2.5 h-2.5 rounded-full\" style=\"background:#E8731B\"><\u002Fspan>Alta<\u002Fspan>\n      <span class=\"inline-flex items-center gap-2 px-3 py-1.5 rounded-md bg-card border border-line text-[12px] font-semibold\"><span class=\"w-2.5 h-2.5 rounded-full\" style=\"background:#B4B6BE\"><\u002Fspan>Baixa<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TIPOGRAFIA -->\n  <section id=\"tipografia\">\n    <div class=\"flex items-center gap-2.5 mb-2\"><span class=\"w-1 h-3.5 bg-orange rounded-sm\"><\u002Fspan><span class=\"eyebrow text-orange\">03 · Tipografia<\u002Fspan><\u002Fdiv>\n    <h2 class=\"h2 text-[34px] text-navy mb-3\">Saira engenheira. Poppins conduz.<\u002Fh2>\n    <p class=\"text-[15px] text-ink-2 max-w-2xl leading-relaxed mb-10\"><b>Saira<\u002Fb> (tabular) dá o caráter técnico — títulos, KPIs, códigos de OS e numerais. <b>Poppins<\u002Fb> conduz o texto de interface e o corpo. <span class=\"text-ink-3\">Substituições Google Fonts dos tipos das peças — confirmar fonte oficial no manual.<\u002Fspan><\u002Fp>\n    <div class=\"grid md:grid-cols-2 gap-5\">\n      <div class=\"bg-navy-deep rounded-xl p-7 text-white\">\n        <span class=\"eyebrow text-amber\">Saira · Display / Dados<\u002Fspan>\n        <div class=\"font-brand text-[52px] font-bold leading-none mt-3\">Painel de Operações<\u002Fdiv>\n        <div class=\"font-brand tnum text-[40px] font-bold text-orange mt-2\">87% · CH-047<\u002Fdiv>\n        <div class=\"font-brand text-[11px] tracking-[0.16em] uppercase text-paper/50 mt-3\">Pesos 500 · 700 · 800 — tabular-nums<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bg-card border border-line rounded-xl p-7\">\n        <span class=\"eyebrow text-ink-3\">Poppins · Interface / Corpo<\u002Fspan>\n        <div class=\"text-[19px] font-semibold text-navy mt-3 leading-snug\">Manutenção planejada reduz imprevistos.<\u002Fdiv>\n        <p class=\"text-[14px] text-ink-2 mt-2 leading-relaxed\">A engenharia preventiva protege as finanças e a estrutura do patrimônio — texto de leitura confortável em 14–16px, peso 400/500.<\u002Fp>\n        <div class=\"flex gap-4 mt-4 pt-4 border-t border-line-soft text-[12px] text-ink-3\"><span><b class=\"text-ink\">Aa<\u002Fb> 400<\u002Fspan><span><b class=\"text-ink\">Aa<\u002Fb> 500<\u002Fspan><span><b class=\"text-ink\">Aa<\u002Fb> 600<\u002Fspan><span><b class=\"text-ink\">Aa<\u002Fb> 700<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- COMPONENTES -->\n  <section id=\"componentes\">\n    <div class=\"flex items-center gap-2.5 mb-2\"><span class=\"w-1 h-3.5 bg-orange rounded-sm\"><\u002Fspan><span class=\"eyebrow text-orange\">04 · Componentes<\u002Fspan><\u002Fdiv>\n    <h2 class=\"h2 text-[34px] text-navy mb-3\">Primitivos de operação.<\u002Fh2>\n    <p class=\"text-[15px] text-ink-2 max-w-2xl leading-relaxed mb-10\">Hairlines em vez de sombras; raios contidos (6–10px); status e prioridade como traço + texto, não pílula gorda.<\u002Fp>\n    <div class=\"grid sm:grid-cols-2 gap-5\">\n      <!-- Botões -->\n      <div class=\"bg-card border border-line rounded-lg p-5\">\n        <div class=\"font-brand text-[11px] font-bold tracking-[0.12em] uppercase text-ink-3 mb-3\">Botões<\u002Fdiv>\n        <div class=\"flex flex-wrap items-center gap-2.5\">\n          <button class=\"inline-flex items-center gap-2 px-4 py-2 rounded-md bg-orange text-white text-[13px] font-bold shadow-[0_2px_0_0_#C5590C]\">+ Nova OS<\u002Fbutton>\n          <button class=\"inline-flex items-center gap-2 px-3.5 py-2 rounded-md border border-line text-[13px] font-semibold text-navy\">Filtros<\u002Fbutton>\n          <button class=\"inline-flex items-center gap-2 px-3.5 py-2 rounded-md bg-navy text-white text-[13px] font-semibold\">Institucional<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Status / prioridade -->\n      <div class=\"bg-card border border-line rounded-lg p-5\">\n        <div class=\"font-brand text-[11px] font-bold tracking-[0.12em] uppercase text-ink-3 mb-3\">Status &amp; Prioridade<\u002Fdiv>\n        <div class=\"flex flex-wrap items-center gap-3\">\n          <span class=\"inline-flex items-center gap-1.5 text-[12px] font-semibold text-[#1E8E45]\"><span class=\"w-1.5 h-4 rounded-sm bg-[#1E8E45]\"><\u002Fspan>Concluído<\u002Fspan>\n          <span class=\"inline-flex items-center gap-1.5 text-[12px] font-semibold text-[#946000]\"><span class=\"w-1.5 h-4 rounded-sm bg-[#F4A300]\"><\u002Fspan>Em andamento<\u002Fspan>\n          <span class=\"inline-flex items-center gap-1.5 text-[12px] font-semibold text-ink-2\"><span class=\"w-1.5 h-1.5 rounded-full bg-[#D6362B]\"><\u002Fspan>Crítica<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- KPI rail -->\n      <div class=\"bg-card border border-line rounded-lg overflow-hidden sm:col-span-2\">\n        <div class=\"font-brand text-[11px] font-bold tracking-[0.12em] uppercase text-ink-3 px-5 pt-4\">KPI Rail tipográfico<\u002Fdiv>\n        <div class=\"grid grid-cols-2 sm:grid-cols-4 mt-2\">\n          <div class=\"px-5 py-4\"><div class=\"font-brand text-[10px] font-semibold tracking-[0.14em] uppercase text-ink-3\">OS Abertas<\u002Fdiv><div class=\"font-brand tnum text-[32px] font-bold text-navy leading-none mt-1.5\">12<\u002Fdiv><div class=\"text-[11px] font-bold text-[#1E8E45] mt-1.5\">↗ +3 hoje<\u002Fdiv><\u002Fdiv>\n          <div class=\"px-5 py-4 border-l border-line-soft\"><div class=\"font-brand text-[10px] font-semibold tracking-[0.14em] uppercase text-ink-3\">Backlog<\u002Fdiv><div class=\"font-brand tnum text-[32px] font-bold text-navy leading-none mt-1.5\">23<\u002Fdiv><div class=\"text-[11px] font-bold text-[#D6362B] mt-1.5\">↘ 4 críticos<\u002Fdiv><\u002Fdiv>\n          <div class=\"px-5 py-4 border-l border-line-soft\"><div class=\"font-brand text-[10px] font-semibold tracking-[0.14em] uppercase text-ink-3\">SLA<\u002Fdiv><div class=\"font-brand tnum text-[32px] font-bold text-navy leading-none mt-1.5\">87<span class=\"text-base text-ink-3\">%<\u002Fspan><\u002Fdiv><div class=\"text-[11px] font-bold text-[#1E8E45] mt-1.5\">↗ +2pp<\u002Fdiv><\u002Fdiv>\n          <div class=\"px-5 py-4 border-l border-line-soft\"><div class=\"font-brand text-[10px] font-semibold tracking-[0.14em] uppercase text-ink-3\">T. Médio<\u002Fdiv><div class=\"font-brand tnum text-[32px] font-bold text-navy leading-none mt-1.5\">2.3<span class=\"text-base text-ink-3\">d<\u002Fspan><\u002Fdiv><div class=\"text-[11px] font-bold text-[#1E8E45] mt-1.5\">↗ −0.4d<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"text-[12.5px] text-ink-3 mt-4\">Componentes React de marca (Button, Badge, Checklist, Card) em <code class=\"font-brand text-orange-700 bg-orange-50 px-1.5 py-0.5 rounded text-[11px]\">components/core/<\u002Fcode> · primitivos do app em <code class=\"font-brand text-orange-700 bg-orange-50 px-1.5 py-0.5 rounded text-[11px]\">components/app/<\u002Fcode>.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- TELAS -->\n  <section id=\"telas\">\n    <div class=\"flex items-center gap-2.5 mb-2\"><span class=\"w-1 h-3.5 bg-orange rounded-sm\"><\u002Fspan><span class=\"eyebrow text-orange\">05 · Telas do Produto<\u002Fspan><\u002Fdiv>\n    <h2 class=\"h2 text-[34px] text-navy mb-3\">Cinco telas mockadas.<\u002Fh2>\n    <p class=\"text-[15px] text-ink-2 max-w-2xl leading-relaxed mb-10\">Painel, Ordens de Serviço, Plano de Manutenção, Backlog GUT e Cockpit — com tabelas, listas, matriz de calendário, gráficos e infográficos. Tudo no mesmo shell navegável.<\u002Fp>\n    <div class=\"grid sm:grid-cols-2 gap-5\">\n      <a href=\"ui_kits/app/index.html\" class=\"group block rounded-xl overflow-hidden border border-line bg-card hover:border-orange/50 hover:shadow-[0_12px_30px_rgba(28,39,72,.10)] transition-all\">\n        <div class=\"aspect-[16/10] bg-paper overflow-hidden border-b border-line\"><img src=\"1cff7089-243a-44fc-885c-fa0ff0009028\" class=\"w-full h-full object-cover object-top group-hover:scale-[1.02] transition-transform\" alt=\"\"><\u002Fdiv>\n        <div class=\"p-4 flex items-center justify-between\"><div><div class=\"font-brand text-[15px] font-bold text-navy\">Painel &amp; Ordens<\u002Fdiv><div class=\"text-[12px] text-ink-3\">KPI rail · tabela de OS · backlog<\u002Fdiv><\u002Fdiv><i class=\"text-orange font-bold\">→<\u002Fi><\u002Fdiv>\n      <\u002Fa>\n      <a href=\"ui_kits/app/index.html\" class=\"group block rounded-xl overflow-hidden border border-line bg-card hover:border-orange/50 hover:shadow-[0_12px_30px_rgba(28,39,72,.10)] transition-all\">\n        <div class=\"aspect-[16/10] bg-paper overflow-hidden border-b border-line\"><img src=\"666e668b-06b7-4192-b172-7f28bad1e90b\" class=\"w-full h-full object-cover object-top group-hover:scale-[1.02] transition-transform\" alt=\"\"><\u002Fdiv>\n        <div class=\"p-4 flex items-center justify-between\"><div><div class=\"font-brand text-[15px] font-bold text-navy\">Plano de Manutenção<\u002Fdiv><div class=\"text-[12px] text-ink-3\">Matriz de calendário por equipamento<\u002Fdiv><\u002Fdiv><i class=\"text-orange font-bold\">→<\u002Fi><\u002Fdiv>\n      <\u002Fa>\n      <a href=\"ui_kits/app/index.html\" class=\"group block rounded-xl overflow-hidden border border-line bg-card hover:border-orange/50 hover:shadow-[0_12px_30px_rgba(28,39,72,.10)] transition-all\">\n        <div class=\"aspect-[16/10] bg-paper overflow-hidden border-b border-line\"><img src=\"68f01e88-a92f-4642-9850-6a99c2e08a83\" class=\"w-full h-full object-cover object-top group-hover:scale-[1.02] transition-transform\" alt=\"\"><\u002Fdiv>\n        <div class=\"p-4 flex items-center justify-between\"><div><div class=\"font-brand text-[15px] font-bold text-navy\">Cockpit &amp; KPIs<\u002Fdiv><div class=\"text-[12px] text-ink-3\">Linha · gauge · donut · ciclo<\u002Fdiv><\u002Fdiv><i class=\"text-orange font-bold\">→<\u002Fi><\u002Fdiv>\n      <\u002Fa>\n      <a href=\"ui_kits/app/login.html\" class=\"group block rounded-xl overflow-hidden border border-line bg-card hover:border-orange/50 hover:shadow-[0_12px_30px_rgba(28,39,72,.10)] transition-all\">\n        <div class=\"aspect-[16/10] bg-navy-deep overflow-hidden border-b border-line flex items-center justify-center\"><img src=\"4c8153f1-35b2-439b-a7e4-b6bfa43f5ebc\" class=\"w-20 h-20 object-contain opacity-90 group-hover:scale-105 transition-transform\" alt=\"\"><\u002Fdiv>\n        <div class=\"p-4 flex items-center justify-between\"><div><div class=\"font-brand text-[15px] font-bold text-navy\">Login<\u002Fdiv><div class=\"text-[12px] text-ink-3\">Split navy / papel<\u002Fdiv><\u002Fdiv><i class=\"text-orange font-bold\">→<\u002Fi><\u002Fdiv>\n      <\u002Fa>\n    <\u002Fdiv>\n    <div class=\"flex flex-wrap gap-3 mt-6 text-[12.5px]\">\n      <a href=\"ui_kits/social/index.html\" class=\"inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-line bg-card font-semibold text-navy hover:border-ink-3 transition\">Marketing · Posts →<\u002Fa>\n      <a href=\"ui_kits/web/index.html\" class=\"inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-line bg-card font-semibold text-navy hover:border-ink-3 transition\">Marketing · Landing →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PRINCÍPIOS -->\n  <section id=\"principios\">\n    <div class=\"flex items-center gap-2.5 mb-2\"><span class=\"w-1 h-3.5 bg-orange rounded-sm\"><\u002Fspan><span class=\"eyebrow text-orange\">06 · Princípios<\u002Fspan><\u002Fdiv>\n    <h2 class=\"h2 text-[34px] text-navy mb-8\">Instrumento de operação.<\u002Fh2>\n    <div class=\"grid sm:grid-cols-2 gap-4\">\n      <div class=\"bg-card border border-line rounded-lg p-5\"><div class=\"font-brand tnum text-[22px] font-bold text-orange\">01<\u002Fdiv><div class=\"font-brand text-[15px] font-bold text-navy mt-1\">Papel quente, não slate frio<\u002Fdiv><p class=\"text-[13px] text-ink-2 mt-1.5 leading-snug\">O fundo herda o off-white da marca. Diferencia de todo dashboard genérico.<\u002Fp><\u002Fdiv>\n      <div class=\"bg-card border border-line rounded-lg p-5\"><div class=\"font-brand tnum text-[22px] font-bold text-orange\">02<\u002Fdiv><div class=\"font-brand text-[15px] font-bold text-navy mt-1\">Laranja com parcimônia<\u002Fdiv><p class=\"text-[13px] text-ink-2 mt-1.5 leading-snug\">Só ação, ativo, crítico e alerta. Restrição lê como sofisticação.<\u002Fp><\u002Fdiv>\n      <div class=\"bg-card border border-line rounded-lg p-5\"><div class=\"font-brand tnum text-[22px] font-bold text-orange\">03<\u002Fdiv><div class=\"font-brand text-[15px] font-bold text-navy mt-1\">Dado em primeiro lugar<\u002Fdiv><p class=\"text-[13px] text-ink-2 mt-1.5 leading-snug\">Saira tabular, KPI rail tipográfico, hairlines. Sem ornamento que não informe.<\u002Fp><\u002Fdiv>\n      <div class=\"bg-card border border-line rounded-lg p-5\"><div class=\"font-brand tnum text-[22px] font-bold text-orange\">04<\u002Fdiv><div class=\"font-brand text-[15px] font-bold text-navy mt-1\">O símbolo como narrativa<\u002Fdiv><p class=\"text-[13px] text-ink-2 mt-1.5 leading-snug\">A engrenagem-ciclo vira marca-d'água e infográfico — reforça o conceito de manutenção contínua.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n\n<footer class=\"bg-navy-deep text-paper/60 relative overflow-hidden\">\n  <img src=\"4c8153f1-35b2-439b-a7e4-b6bfa43f5ebc\" class=\"absolute -left-16 -bottom-20 w-72 opacity-[0.05]\" alt=\"\">\n  <div class=\"max-w-[1080px] mx-auto px-6 py-12 relative flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6\">\n    <div>\n      <img src=\"1aa7ffd5-2961-4187-b408-cb56da96e355\" class=\"h-7 mb-3\" alt=\"Sinérgica\">\n      <p class=\"text-[12px] text-paper/40 max-w-sm leading-relaxed\">Design system do Sinérgica OS · direção instrumento de operação. Fontes substituídas (Saira/Poppins) — confirmar tipos oficiais no manual da marca.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"flex flex-col gap-1.5 text-[12.5px]\">\n      <a href=\"readme.md\" class=\"hover:text-orange transition\">↳ README técnico<\u002Fa>\n      <a href=\"ui_kits/app/index.html\" class=\"hover:text-orange transition\">↳ Abrir o produto<\u002Fa>\n      <span class=\"font-brand text-[10px] tracking-[0.16em] uppercase text-paper/30 mt-2\">Sinérgica OS · v2 · Trívia Studio<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n<\u002Fbody><\u002Fhtml>"
