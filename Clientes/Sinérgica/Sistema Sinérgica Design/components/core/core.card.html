<!-- @dsCard group="Components" viewport="700x440" name="Core — Button · Badge · Checklist · Card" subtitle="Primitivos de UI da Sinérgica" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--sin-offwhite);padding:22px;color:var(--sin-ink)}
  .grp{margin-bottom:20px}
  .lbl{font-family:var(--font-brand);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--sin-ink-3);margin-bottom:12px}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  // resolve namespace dinamicamente
  function findNS(...names){
    for(const k of Object.keys(window)){
      const v = window[k];
      if(v && typeof v==='object' && names.every(n=>typeof v[n]==='function')) return v;
    }
    return {};
  }
  const NS = findNS('Button','Badge','Checklist','Card');
  const { Button, Badge, Checklist, Card } = NS;
  const ready = Button && Badge && Checklist && Card;

  function Demo(){
    return (
      <div>
        <div className="grp">
          <div className="lbl">Button</div>
          <div className="row">
            <Button variant="primary">Solicitar diagnóstico</Button>
            <Button variant="navy">Falar com a equipe</Button>
            <Button variant="outline">Saiba mais</Button>
            <Button variant="ghost">Ver mais</Button>
            <Button variant="primary" pill size="sm">Pill SM</Button>
            <Button variant="navy" disabled>Disabled</Button>
          </div>
        </div>
        <div className="grp">
          <div className="lbl">Badge</div>
          <div className="row">
            <Badge variant="orange">Manutenção Predial</Badge>
            <Badge variant="navy">Engenharia</Badge>
            <Badge variant="success" uppercase={false}>Concluído</Badge>
            <Badge variant="neutral">Preventiva</Badge>
            <Badge variant="outline">Premium</Badge>
          </div>
        </div>
        <div className="cols">
          <div className="grp" style={{marginBottom:0}}>
            <div className="lbl">Checklist</div>
            <Checklist items={['Elétrica','Hidráulica','Estrutura']} />
          </div>
          <div className="grp" style={{marginBottom:0}}>
            <div className="lbl">Card</div>
            <Card pad="sm">
              <Badge variant="orange" size="sm">Diferencial</Badge>
              <div style={{fontSize:18,fontWeight:700,marginTop:10}}>Manutenção planejada</div>
              <div style={{fontSize:14,color:'var(--sin-ink-2)',marginTop:6,lineHeight:1.5}}>Reduz imprevistos e custos na gestão condominial.</div>
            </Card>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(
    ready ? <Demo/> : <div style={{fontFamily:'var(--font-ui)',color:'var(--sin-ink-2)',padding:8}}>Componentes carregam após a compilação do design system.</div>
  );
</script>
</body></html>
