function sectionLabel(txt,extra=''){
  return `<div class="flex items-center gap-2.5 ${extra}">
    <span class="w-1 h-3.5 bg-orange rounded-sm"></span>
    <span class="font-brand text-[12px] font-bold tracking-[0.16em] uppercase text-navy">${txt}</span>

}
function kpiCell(k,i){
  const dc=k.dir==='up'?'text-[#1E8E45]':k.dir==='down'?'text-[#D6362B]':'text-ink-3';
  const di=k.dir==='up'?'arrow-up-right':k.dir==='down'?'arrow-down-right':'arrow-right';
  const isLeftCol = i%4===0;
  return `<div class="reveal px-5 py-4 ${isLeftCol?'':'border-l border-line-soft'}" style="animation-delay:${i*40}ms">
    <div class="font-brand text-[10.5px] font-semibold tracking-[0.14em] uppercase text-ink-3">${k.label}</div>
    <div class="mt-2 flex items-baseline gap-0.5">
      <span class="font-brand tnum text-[34px] leading-none font-bold text-navy">${k.valor}</span>
      ${k.unidade?`<span class="font-brand text-base font-semibold text-ink-3">${k.unidade}</span>`:''}
    </div>
    <div class="mt-2 flex items-center gap-1.5">
      <span class="inline-flex items-center gap-0.5 text-[11px] font-bold ${dc}"><i data-lucide="${di}" class="w-3 h-3"></i>${k.delta}</span>
      <span class="text-[11px] text-ink-3">${k.hint}</span>
    </div></div>`;
}

    <div class="min-w-0">

      <p class="text-[11.5px] text-ink-3 truncate mt-0.5">${os.condominio} &middot; ${os.cat} &middot; ${os.resp}</p>
    </div>
    <div class="hidden md:flex items-center gap-1.5">

    </div></div>`;
}

/* ============ COCKPIT (gráficos + infográficos) ============ */
function lineChart(values,w,h,color,fill){
  const max=100,min=60,pad=4;
  const xs=(i)=>pad+i*((w-pad*2)/(values.length-1));
  const ys=(v)=>h-pad-((v-min)/(max-min))*(h-pad*2);
  const pts=values.map((v,i)=>`${xs(i).toFixed(1)},${ys(v).toFixed(1)}`).join(' ');
  const area=`${pad},${h-pad} ${pts} ${(w-pad)},${h-pad}`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" class="w-full" style="height:${h}px">
    <polygon points="${area}" fill="${fill}"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
  </svg>`;
}
function donut(segs,size){
  const tot=segs.reduce((a,b)=>a+b.v,0);let acc=0;const stops=[];
  segs.forEach(s=>{const a=acc/tot*100,b=(acc+s.v)/tot*100;stops.push(`${s.c} ${a.toFixed(1)}% ${b.toFixed(1)}%`);acc+=s.v;});
  const hole=size*0.56;
  return `<div class="relative shrink-0" style="width:${size}px;height:${size}px;border-radius:50%;background:conic-gradient(${stops.join(',')})">
    <div class="absolute rounded-full bg-card flex flex-col items-center justify-center" style="inset:${(size-hole)/2}px">
      <span class="font-brand tnum font-extrabold text-navy leading-none" style="font-size:${size*0.18}px">${tot}</span>
      <span class="font-brand font-semibold text-ink-3" style="font-size:${size*0.06}px;letter-spacing:.1em">OS / MÊS</span>
    </div></div>`;
}
function gauge(pct,size){
  const r=size/2-12,cx=size/2,cy=size/2,C=Math.PI*r;const len=pct/100*C;
  return `<svg viewBox="0 0 ${size} ${size/2+12}" style="width:${size}px">
    <path d="M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="#EDEAE2" stroke-width="14" stroke-linecap="round"/>
    <path d="M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="#E8731B" stroke-width="14" stroke-linecap="round" stroke-dasharray="${len.toFixed(1)} ${C.toFixed(1)}"/>
    <text x="${cx}" y="${cy-6}" text-anchor="middle" class="font-brand" style="font-size:26px;font-weight:800;fill:#1C2748">${pct}%</text>
    <text x="${cx}" y="${cy+8}" text-anchor="middle" style="font-size:9px;letter-spacing:.1em;fill:#8C8F9B;font-weight:600">SLA NO PRAZO</text>
  </svg>`;
}
function barsH(data){

  return data.map(d=>`<div class="flex items-center gap-3">
    <span class="text-[12px] text-ink-2 w-28 truncate text-right">${d.l}</span>
    <div class="flex-1 h-5 rounded bg-line-soft overflow-hidden"><div class="h-full rounded flex items-center justify-end pr-2" style="width:${Math.max(d.v/max*100,12)}%;background:${d.c}"><span class="font-brand tnum text-[10px] font-bold text-white">${d.v}</span></div></div>
  </div>`).join('');
}

            <div class="w-12 h-12 rounded-xl bg-white/[0.06] border border-white/10 flex items-center justify-center"><i data-lucide="${c.ic}" class="w-5 h-5 text-orange"></i></div>
            <span class="font-brand text-[11px] font-bold text-white text-center">${c.l}</span>
            <span class="font-brand tnum text-[9px] font-bold text-paper/40">0${i+1}</span>
          </div>
          ${i<CICLO.length-1?'<i data-lucide="arrow-right" class="w-4 h-4 text-orange/60 shrink-0"></i>':'<i data-lucide="refresh-cw" class="w-4 h-4 text-orange shrink-0"></i>'}
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

const PCM_PAGES={painel:dashboard,ordens:ordensPage,plano:planoPage,backlog:backlogPage,cockpit:cockpitPage};

function render(){
  const modulo=MODULOS.find(m=>m.id===active);
  document.getElementById('app').innerHTML=`
  <!-- Sidebar -->
  <aside class="w-[228px] shrink-0 bg-navy-deep flex flex-col relative overflow-hidden">
    <img src="../../assets/symbol-offwhite.png" class="absolute -left-12 bottom-24 w-48 opacity-[0.045] pointer-events-none" alt="">
    <div class="px-5 pt-6 pb-5 relative">
      <img src="../../assets/logo-h-offwhite.png" class="h-[26px] w-auto" alt="Sinérgica">
      <div class="flex items-center gap-1.5 mt-3 pl-0.5">
        <span class="w-1 h-1 rounded-full bg-orange"></span>
        <span class="font-brand text-[9px] font-bold tracking-[0.22em] uppercase text-paper/45">Sistema Operacional</span>
      </div>
    </div>
    <div class="h-px bg-navy-line/50 mx-5"></div>
    <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-5 no-scrollbar relative">
      ${active==='pcm' ? PCM_NAV.map(g=>`<div>
        <p class="px-2.5 font-brand text-[10px] font-bold text-paper/35 uppercase tracking-[0.18em] mb-2">${g.titulo}</p>
        <div class="space-y-0.5">
        ${g.items.map(it=>{const on=it.page===pcmPage;return `<button data-page="${it.page}" class="navbtn w-full flex items-center gap-3 pl-3 pr-2.5 py-2 rounded-md text-[13px] transition-all relative ${on?'bg-white/[0.07] text-white font-semibold':'text-paper/55 hover:bg-white/[0.04] hover:text-paper/90'}">
          ${on?'<span class=\"absolute left-0 top-1.5 bottom-1.5 w-[3px] rounded-r bg-orange\"></span>':''}
          <i data-lucide="${it.icon}" class="w-[17px] h-[17px] shrink-0 ${on?'text-orange':''}"></i>
          <span class="truncate flex-1 text-left">${it.label}</span>
          ${it.badge?`<span class="font-brand tnum text-[10px] font-bold px-1.5 py-0.5 rounded ${on?'bg-orange text-white':'bg-white/[0.08] text-paper/60'}">${it.badge}</span>`:''}</button>`}).join('')}
        </div>
      </div>`).join('') : `<div class="px-3 pt-6 text-center"><p class="text-[12px] text-paper/45 leading-relaxed">A navegação deste módulo<br>aparece quando ele for construído.</p></div>`}
    </nav>
    <div class="px-3 py-3 relative">
      <div class="h-px bg-navy-line/50 mb-3 mx-2"></div>
      <button class="w-full flex items-center gap-3 pl-3 pr-2.5 py-2 rounded-md text-[13px] text-paper/55 hover:bg-white/[0.04] hover:text-paper/90 transition"><i data-lucide="settings" class="w-[17px] h-[17px]"></i>Configurações</button>
      <button class="w-full flex items-center gap-3 pl-3 pr-2.5 py-2 rounded-md text-[13px] text-paper/55 hover:bg-white/[0.04] hover:text-paper/90 transition"><i data-lucide="log-out" class="w-[17px] h-[17px]"></i>Sair</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header class="bg-card border-b border-line shrink-0">
      <div class="flex items-stretch gap-0 px-3 overflow-x-auto no-scrollbar">
        ${MODULOS.map(m=>{const a=m.id===active;return `<button data-mod="${m.id}" class="modtab group flex items-center gap-2.5 px-3.5 py-3 whitespace-nowrap border-b-2 transition-colors shrink-0 ${a?'border-orange':'border-transparent hover:border-line'}">
          <i data-lucide="${m.icon}" class="w-[18px] h-[18px] ${a?'text-orange':'text-ink-3 group-hover:text-navy'}"></i>
          <div class="text-left">
            <div class="text-[12.5px] font-semibold leading-none ${a?'text-navy':'text-ink-2 group-hover:text-navy'}">${m.label}</div>
            <div class="text-[9.5px] tracking-wide uppercase leading-none mt-1 ${a?'text-orange/80':'text-ink-4'}">${m.sub}</div>
          </div></button>`}).join('')}
        <div class="ml-auto pl-4 flex items-center gap-2 shrink-0">
          <button class="w-9 h-9 rounded-md flex items-center justify-center text-ink-3 hover:bg-paper hover:text-navy transition relative"><i data-lucide="search" class="w-[18px] h-[18px]"></i></button>
          <button class="w-9 h-9 rounded-md flex items-center justify-center text-ink-3 hover:bg-paper hover:text-navy transition relative"><i data-lucide="bell" class="w-[18px] h-[18px]"></i><span class="absolute top-2 right-2.5 w-1.5 h-1.5 rounded-full bg-orange ring-2 ring-card"></span></button>
          <div class="w-px h-6 bg-line mx-1"></div>
          <div class="flex items-center gap-2.5">
            <div class="text-right hidden md:block"><p class="text-[12.5px] font-bold text-navy leading-tight">${user.name}</p><p class="text-[10.5px] text-ink-3 leading-tight">${user.role}</p></div>
            <div class="w-9 h-9 rounded-md bg-navy flex items-center justify-center text-paper font-brand text-[13px] font-bold">${initials}</div>
          </div>
        </div>
      </div>
    </header>
    <main class="flex-1 overflow-y-auto p-6">
      ${active==='pcm' ? PCM_PAGES[pcmPage]() : emConstrucao(modulo)}
    </main>
  </div>`;
  document.querySelectorAll('.modtab').forEach(b=>b.onclick=()=>{active=b.dataset.mod;render();const m=document.querySelector('main');if(m)m.scrollTop=0;});
  document.querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>{pcmPage=b.dataset.page;render();const m=document.querySelector('main');if(m)m.scrollTop=0;});
  document.querySelectorAll('.osfilter').forEach(b=>b.onclick=()=>{filtroOS=b.dataset.osf;render();});
  if(window.lucide) lucide.createIcons();
}
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>render();</script>
</body></html>
