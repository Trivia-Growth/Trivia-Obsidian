document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ng-snug\">${item.titulo}<\u002Fp>\n      <div class=\"flex items-center justify-between mt-2\">\n        <p class=\"text-[11.5px] text-ink-3\">${item.condominio}<\u002Fp>\n        <div class=\"flex items-center gap-1 font-brand tnum text-[10px] text-ink-3\">\n          <span class=\"px-1 py-0.5 rounded bg-line-soft\" title=\"Gravidade\">G${item.g}<\u002Fspan>\n          <span class=\"px-1 py-0.5 rounded bg-line-soft\" title=\"Urgência\">U${item.u}<\u002Fspan>\n          <span class=\"px-1 py-0.5 rounded bg-line-soft\" title=\"Tendência\">T${item.t}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv><\u002Fdiv>`;\n}\nfunction dashboard(){\n  return `<div class=\"flex flex-col gap-5 max-w-[1180px]\">\n    <!-- Cabeçalho de operação -->\n    <div class=\"flex items-end justify-between gap-6 flex-wrap reveal\">\n      <div>\n        <div class=\"flex items-center gap-2 mb-1.5\">\n          <span class=\"font-brand text-[11px] font-bold tracking-[0.18em] uppercase text-orange\">PCM<\u002Fspan>\n          <span class=\"w-1 h-1 rounded-full bg-ink-4\"><\u002Fspan>\n          <span class=\"font-brand text-[11px] font-semibold tracking-[0.14em] uppercase text-ink-3\">Centro de Operações<\u002Fspan>\n        <\u002Fdiv>\n        <h1 class=\"font-brand text-[30px] font-bold text-navy leading-none\">Painel de Operações<\u002Fh1>\n        <p class=\"text-[13px] text-ink-2 mt-2\">5 ordens em andamento, 4 itens críticos no backlog — priorize as corretivas de hoje.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"flex items-center gap-2.5\">\n        <div class=\"hidden lg:flex items-center gap-2 px-3 py-2 rounded-md border border-line bg-card text-ink-2\">\n          <i data-lucide=\"calendar\" class=\"w-4 h-4 text-ink-3\"><\u002Fi>\n          <span class=\"text-[12.5px] font-medium capitalize\">${hoje}<\u002Fspan>\n        <\u002Fdiv>\n        <button class=\"inline-flex items-center gap-2 px-3.5 py-2 rounded-md border border-line bg-card text-[13px] font-semibold text-navy hover:border-ink-3 transition whitespace-nowrap\">\n          <i data-lucide=\"sliders-horizontal\" class=\"w-4 h-4\"><\u002Fi>Filtros<\u002Fbutton>\n        <button class=\"inline-flex items-center gap-2 px-4 py-2 rounded-md bg-orange text-white text-[13px] font-bold hover:bg-orange-deep transition shadow-[0_2px_0_0_#C5590C] whitespace-nowrap\">\n          <i data-lucide=\"plus\" class=\"w-4 h-4\"><\u002Fi>Nova OS<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- KPI rail tipográfico -->\n    <div class=\"bg-card border border-line rounded-lg overflow-hidden\">\n      <div class=\"grid grid-cols-2 md:grid-cols-4\">\n        ${KPIS.slice(0,4).map((k,i)=>kpiCell(k,i)).join('')}\n      <\u002Fdiv>\n      <div class=\"border-t border-line-soft grid grid-cols-2 md:grid-cols-4\">\n        ${KPIS.slice(4).map((k,i)=>kpiCell(k,i+4)).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- OS + Backlog -->\n    <div class=\"grid grid-cols-1 lg:grid-cols-[1.85fr_1fr] gap-5\">\n      <div class=\"bg-card border border-line rounded-lg overflow-hidden\">\n        <div class=\"px-5 py-4 flex items-center justify-between border-b border-line-soft\">\n          ${sectionLabel('Ordens de Serviço')}\n          <span class=\"inline-flex items-center gap-1 text-[12px] text-navy font-bold cursor-pointer group\">Ver todas<i data-lucide=\"arrow-right\" class=\"w-3.5 h-3.5 group-hover:translate-x-0.5 transition-transform\"><\u002Fi><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"divide-y divide-line-soft\">${OS_RECENTES.map(osRow).join('')}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bg-card border border-line rounded-lg overflow-hidden\">\n        <div class=\"px-5 py-4 border-b border-line-soft\">${sectionLabel('Top Backlog GUT')}<\u002Fdiv>\n        <div class=\"divide-y divide-line-soft\">${BACKLOG_TOP.map(backlogRow).join('')}<\u002Fdiv>\n        <div class=\"px-5 py-3 border-t border-line-soft bg-paper/40\">\n          <span class=\"inline-flex items-center gap-1 text-[12px] text-navy font-bold cursor-pointer group\">Abrir backlog completo<i data-lucide=\"arrow-right\" class=\"w-3.5 h-3.5 group-hover:translate-x-0.5 transition-transform\"><\u002Fi><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction emConstrucao(m){\n  return `<div class=\"flex-1 flex flex-col items-center justify-center gap-5 text-center p-12 min-h-[460px] reveal\">\n    <div class=\"relative\">\n      <div class=\"w-[72px] h-[72px] rounded-xl bg-navy flex items-center justify-center\">\n        <i data-lucide=\"${m.icon}\" class=\"w-8 h-8 text-paper/90\"><\u002Fi>\n      <\u002Fdiv>\n      <span class=\"absolute -right-2 -bottom-2 w-7 h-7 rounded-lg bg-orange flex items-center justify-center border-[3px] border-paper\"><i data-lucide=\"hammer\" class=\"w-3.5 h-3.5 text-white\"><\u002Fi><\u002Fspan>\n    <\u002Fdiv>\n    <div><h2 class=\"font-brand text-[22px] font-bold text-navy\">Módulo ${m.label}<\u002Fh2>\n      <p class=\"text-[13px] text-ink-2 mt-1.5 max-w-sm\">${m.sub} — esta área entra no roadmap do Sinérgica OS.<\u002Fp><\u002Fdiv>\n    <span class=\"inline-flex items-center gap-2 font-brand text-[11px] font-bold uppercase tracking-[0.14em] text-orange bg-orange-soft border border-orange/20 rounded-md px-3.5 py-1.5\">\n      <span class=\"w-1.5 h-1.5 rounded-full bg-orange\"><\u002Fspan>Em construção<\u002Fspan><\u002Fdiv>`;\n}\n/* ============ HELPERS DE PÁGINA ============ */\nfunction pageHeader(eyebrow,title,sub,actions=''){\n  return `<div class=\"flex items-end justify-between gap-6 flex-wrap reveal mb-5\">\n    <div>\n      <div class=\"flex items-center gap-2 mb-1.5\">\n        <span class=\"font-brand text-[11px] font-bold tracking-[0.18em] uppercase text-orange\">PCM<\u002Fspan>\n        <span class=\"w-1 h-1 rounded-full bg-ink-4\"><\u002Fspan>\n        <span class=\"font-brand text-[11px] font-semibold tracking-[0.14em] uppercase text-ink-3\">${eyebrow}<\u002Fspan>\n      <\u002Fdiv>\n      <h1 class=\"font-brand text-[30px] font-bold text-navy leading-none\">${title}<\u002Fh1>\n      <p class=\"text-[13px] text-ink-2 mt-2\">${sub}<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"flex items-center gap-2.5\">${actions}<\u002Fdiv>\n  <\u002Fdiv>`;\n}\nconst btnGhost=(ic,txt)=>`<button class=\"inline-flex items-center gap-2 px-3.5 py-2 rounded-md border border-line bg-card text-[13px] font-semibold text-navy hover:border-ink-3 transition whitespace-nowrap\"><i data-lucide=\"${ic}\" class=\"w-4 h-4\"><\u002Fi>${txt}<\u002Fbutton>`;\nconst btnPrimary=(ic,txt)=>`<button class=\"inline-flex items-center gap-2 px-4 py-2 rounded-md bg-orange text-white text-[13px] font-bold hover:bg-orange-deep transition shadow-[0_2px_0_0_#C5590C] whitespace-nowrap\"><i data-lucide=\"${ic}\" class=\"w-4 h-4\"><\u002Fi>${txt}<\u002Fbutton>`;\n\n/* ============ ORDENS DE SERVIÇO (tabela) ============ */\nconst OS_FULL=[\n  {numero:'CH-047',titulo:'Vazamento em cano no térreo',condominio:'Cond. Primavera',cat:'Corretiva',resp:'A. Lima',sla:'Hoje',slaC:'#D6362B',prioridade:'critica',status:'solicitacao'},\n  {numero:'CH-046',titulo:'Troca de lâmpada — corredor 3º',condominio:'Res. Vila Verde',cat:'Corretiva',resp:'R. Souza',sla:'2 dias',slaC:'#946000',prioridade:'alta',status:'andamento'},\n  {numero:'CH-045',titulo:'Portão eletrônico travado',condominio:'Res. Alamedas',cat:'Corretiva',resp:'R. Souza',sla:'1 dia',slaC:'#D6362B',prioridade:'alta',status:'andamento'},\n  {numero:'CH-044',titulo:\"Revisão da bomba d'água\",condominio:'Ed. Central Park',cat:'Preventiva',resp:'A. Lima',sla:'5 dias',slaC:'#585E72',prioridade:'media',status:'planejado'},\n  {numero:'CH-043',titulo:'Vistoria SPDA anual',condominio:'Cond. Jardins',cat:'Inspeção',resp:'M. Dias',sla:'8 dias',slaC:'#585E72',prioridade:'media',status:'solicitacao'},\n  {numero:'CH-042',titulo:'Limpeza de calhas — bloco B',condominio:'Res. Vila Verde',cat:'Preventiva',resp:'J. Pinto',sla:'No prazo',slaC:'#1E8E45',prioridade:'baixa',status:'concluido'},\n  {numero:'CH-041',titulo:'Reparo de infiltração na garagem',condominio:'Ed. Horizonte',cat:'Corretiva',resp:'A. Lima',sla:'Atrasado',slaC:'#D6362B',prioridade:'critica',status:'andamento'},\n  {numero:'CH-040',titulo:'Manutenção do gerador',condominio:'Cond. Primavera',cat:'Preventiva',resp:'M. Dias',sla:'No prazo',slaC:'#1E8E45',prioridade:'media',status:'concluido'},\n  {numero:'CH-039',titulo:'Substituição de disjuntor — QGBT',condominio:'Res. Alamedas',cat:'Corretiva',resp:'R. Souza',sla:'3 dias',slaC:'#946000',prioridade:'alta',status:'planejado'},\n];\nconst FILTROS_OS=[{k:'todas',l:'Todas',n:9},{k:'solicitacao',l:'Solicitação',n:2},{k:'planejado',l:'Planejado',n:2},{k:'andamento',l:'Em andamento',n:3},{k:'concluido',l:'Concluído',n:2}];\nlet filtroOS='todas';\nfunction osTableRow(os,i){\n  const s=STATUS_MAP[os.status],p=PRIO_MAP[os.prioridade];\n  return `<tr class=\"group border-b border-line-soft hover:bg-paper/70 transition-colors reveal\" style=\"animation-delay:${i*35}ms\">\n    <td class=\"pl-5 pr-2 py-3\"><div class=\"flex items-center gap-3\"><span class=\"w-[3px] h-8 rounded-full\" style=\"background:${p.c}\"><\u002Fspan><span class=\"font-brand tnum text-[13px] font-bold text-navy whitespace-nowrap\">${os.numero}<\u002Fspan><\u002Fdiv><\u002Ftd>\n    <td class=\"px-2 py-3\"><p class=\"text-[13px] font-semibold text-ink\">${os.titulo}<\u002Fp><\u002Ftd>\n    <td class=\"px-2 py-3 text-[12.5px] text-ink-2 whitespace-nowrap\">${os.condominio}<\u002Ftd>\n    <td class=\"px-2 py-3\"><span class=\"text-[11.5px] font-semibold px-2 py-0.5 rounded bg-line-soft text-ink-2 whitespace-nowrap\">${os.cat}<\u002Fspan><\u002Ftd>\n    <td class=\"px-2 py-3 text-[12.5px] text-ink-2 whitespace-nowrap\">${os.resp}<\u002Ftd>\n    <td class=\"px-2 py-3\"><span class=\"inline-flex items-center gap-1.5 text-[12px] font-semibold whitespace-nowrap\"><span class=\"w-1.5 h-1.5 rounded-full\" style=\"background:${p.c}\"><\u002Fspan><span class=\"text-ink-2\">${p.label}<\u002Fspan><\u002Fspan><\u002Ftd>\n    <td class=\"px-2 py-3 font-brand tnum text-[12.5px] font-bold whitespace-nowrap\" style=\"color:${os.slaC}\">${os.sla}<\u002Ftd>\n    <td class=\"px-2 py-3\"><span class=\"inline-flex items-center gap-1.5 text-[11.5px] font-semibold ${s.fg} whitespace-nowrap\"><span class=\"w-1.5 h-4 rounded-sm\" style=\"background:${s.bar}\"><\u002Fspan>${s.label}<\u002Fspan><\u002Ftd>\n    <td class=\"pr-5 pl-2 py-3 text-right\"><i data-lucide=\"arrow-up-right\" class=\"w-4 h-4 text-ink-4 opacity-0 group-hover:opacity-100 transition-opacity inline\"><\u002Fi><\u002Ftd>\n  <\u002Ftr>`;\n}\nfunction ordensPage(){\n  const rows=OS_FULL.filter(o=>filtroOS==='todas'||o.status===filtroOS);\n  const th='text-left font-brand text-[10.5px] font-bold tracking-[0.1em] uppercase text-ink-3 py-3';\n  return `${pageHeader('Ordens de Serviço','Ordens de Serviço','9 ordens ativas · 2 atrasadas exigem atenção imediata.',btnGhost('sliders-horizontal','Filtros')+btnGhost('download','Exportar')+btnPrimary('plus','Nova OS'))}\n  <div class=\"flex items-center gap-1.5 mb-4 flex-wrap reveal\">\n    ${FILTROS_OS.map(f=>{const on=f.k===filtroOS;return `<button data-osf=\"${f.k}\" class=\"osfilter inline-flex items-center gap-2 px-3 py-1.5 rounded-md text-[12.5px] font-semibold transition ${on?'bg-navy text-white':'bg-card border border-line text-ink-2 hover:border-ink-3'}\">\n      ${f.l}<span class=\"font-brand tnum text-[10px] font-bold px-1.5 py-0.5 rounded ${on?'bg-white/15 text-white':'bg-line-soft text-ink-3'}\">${f.n}<\u002Fspan><\u002Fbutton>`}).join('')}\n  <\u002Fdiv>\n  <div class=\"bg-card border border-line rounded-lg overflow-hidden reveal\">\n    <div class=\"overflow-x-auto\">\n      <table class=\"w-full border-collapse\">\n        <thead><tr class=\"border-b border-line bg-paper/40\">\n          <th class=\"${th} pl-5\">OS<\u002Fth><th class=\"${th}\">Título<\u002Fth><th class=\"${th}\">Condomínio<\u002Fth><th class=\"${th}\">Categoria<\u002Fth><th class=\"${th}\">Responsável<\u002Fth><th class=\"${th}\">Prioridade<\u002Fth><th class=\"${th}\">SLA<\u002Fth><th class=\"${th}\">Status<\u002Fth><th class=\"pr-5\"><\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>${rows.map(osTableRow).join('')}<\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n    <div class=\"flex items-center justify-between px-5 py-3 border-t border-line-soft bg-paper/40\">\n      <span class=\"text-[12px] text-ink-3\">Mostrando <b class=\"text-ink-2 tnum\">${rows.length}<\u002Fb> de <b class=\"text-ink-2 tnum\">${OS_FULL.length}<\u002Fb> ordens<\u002Fspan>\n      <div class=\"flex items-center gap-1\">\n        <button class=\"w-7 h-7 rounded border border-line bg-card flex items-center justify-center text-ink-3 hover:border-ink-3\"><i data-lucide=\"chevron-left\" class=\"w-4 h-4\"><\u002Fi><\u002Fbutton>\n        <button class=\"w-7 h-7 rounded bg-navy text-white font-brand tnum text-[12px] font-bold\">1<\u002Fbutton>\n        <button class=\"w-7 h-7 rounded border border-line bg-card font-brand tnum text-[12px] text-ink-2 hover:border-ink-3\">2<\u002Fbutton>\n        <button class=\"w-7 h-7 rounded border border-line bg-card flex items-center justify-center text-ink-3 hover:border-ink-3\"><i data-lucide=\"chevron-right\" class=\"w-4 h-4\"><\u002Fi><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ============ PLANO DE MANUTENÇÃO (matriz de calendário) ============ */\nconst PLANO_AREAS=[\n  {area:'Bloco 1 / Térreo / Recepção',equip:[\n    {nome:'Aquecedor de Ar XPTO 3000',freqs:['Diária','Mensal'],mDay:11},\n    {nome:'Condicionador de Ar tipo janela ABCSSQ',freqs:['Mensal','Diária'],mDay:11},\n    {nome:'Exaustor 498ADC',freqs:['Mensal'],mDay:11},\n    {nome:\"Bomba d'água ABC123456\",freqs:['Diária','Mensal'],mDay:11},\n    {nome:'Chiller XPTO 10000',freqs:['Diária','Mensal'],mDay:11},\n  ]},\n  {area:'Bloco 1 / Térreo / Hall',equip:[\n    {nome:'Difusores de insuflamento e retorno XPTO2020ABC',freqs:['Mensal','Diária'],mDay:11},\n    {nome:'Dispositivo de bloqueio e balanceamento ABC12312321',freqs:['Mensal'],mDay:11},\n    {nome:'Quadro elétrico geral QGBT-01',freqs:['Diária','Mensal'],mDay:18},\n  ]},\n];\nconst HOJE_DIA=15;\nfunction diaCell(d,freq,mDay){\n  // estados: passado=baixado(verde \"1/1\"); hoje=navy; futuro=programado(amber \"0/1\"); mensal=só no mDay\n  if(freq==='Mensal'){\n    if(d===mDay) return `<td class=\"border border-white text-center\" style=\"background:#FBEEE0\"><span class=\"font-brand tnum text-[8px] font-bold text-orange-deep\">1/1<\u002Fspan><\u002Ftd>`;\n    return `<td class=\"border border-line-soft bg-paper/30\"><\u002Ftd>`;\n  }\n  // Diária\n  let pend = (d===7||d===23); // pendência exemplo\n  if(d<HOJE_DIA){\n    return `<td class=\"border border-white text-center relative\" style=\"background:#E6F3EA\"><span class=\"font-brand tnum text-[8px] font-bold text-[#1E8E45]\">1/1<\u002Fspan>${pend?'<span class=\"absolute -top-0.5 -right-0.5 w-1.5 h-1.5 rounded-full bg-[#D6362B]\"><\u002Fspan>':''}<\u002Ftd>`;\n  }\n  if(d===HOJE_DIA){\n    return `<td class=\"border-2 border-navy text-center relative z-10\" style=\"background:#fff\"><span class=\"font-brand tnum text-[8px] font-bold text-navy\">·<\u002Fspan><\u002Ftd>`;\n  }\n  return `<td class=\"border border-white text-center\" style=\"background:#FDF6E8\"><span class=\"font-brand tnum text-[8px] font-bold text-[#B26A00]\">0/1<\u002Fspan><\u002Ftd>`;\n}\nfunction equipBlock(eq){\n  const days=Array.from({length:31},(_,i)=>i+1);\n  return `<div class=\"mb-3\">\n    <div class=\"flex items-center gap-2 mb-1\">\n      <i data-lucide=\"chevron-down\" class=\"w-3.5 h-3.5 text-orange\"><\u002Fi>\n      <span class=\"font-brand text-[12px] font-bold text-navy\">Equipamento: ${eq.nome}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"overflow-x-auto border border-line rounded-md\">\n      <table class=\"border-collapse\" style=\"min-width:760px\">\n        <thead><tr>\n          <th class=\"bg-navy text-white font-brand text-[9px] font-semibold uppercase tracking-wide px-2 py-1 text-left sticky left-0\" style=\"width:130px\">Dezembro/2024<\u002Fth>\n          ${days.map(d=>`<th class=\"bg-navy/90 text-white/90 font-brand tnum text-[8.5px] font-semibold text-center border-l border-navy-line\" style=\"width:21px\">${d}<\u002Fth>`).join('')}\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n        ${eq.freqs.map(fr=>`<tr>\n          <td class=\"bg-paper font-brand text-[10px] font-semibold text-ink-2 px-2 py-0.5 border-t border-line sticky left-0\">${fr}<\u002Ftd>\n          ${days.map(d=>diaCell(d,fr,eq.mDay)).join('')}\n        <\u002Ftr>`).join('')}\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction planoPage(){\n  return `${pageHeader('Preventivo · Cronograma','Plano de Manutenção','Calendário de atividades programadas e baixadas por equipamento.',btnGhost('printer','Imprimir')+btnGhost('download','Exportar PDF')+btnPrimary('plus','Nova atividade'))}\n  <!-- Ficha + legenda -->\n  <div class=\"bg-card border border-line rounded-lg overflow-hidden mb-5 reveal\">\n    <div class=\"grid md:grid-cols-[1fr_auto] gap-4 p-5\">\n      <div class=\"grid grid-cols-3 gap-5\">\n        <div><div class=\"font-brand text-[9px] font-bold tracking-[0.14em] uppercase text-ink-3\">Empresa<\u002Fdiv><div class=\"text-[13px] font-semibold text-navy mt-0.5\">Real Building Enterprise LTDA<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"font-brand text-[9px] font-bold tracking-[0.14em] uppercase text-ink-3\">Unidade de manutenção<\u002Fdiv><div class=\"text-[13px] font-semibold text-navy mt-0.5\">Real Building · Curitiba<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"font-brand text-[9px] font-bold tracking-[0.14em] uppercase text-ink-3\">Período<\u002Fdiv><div class=\"font-brand tnum text-[13px] font-semibold text-navy mt-0.5\">01/12/2024 – 31/12/2024<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flex flex-col gap-2 md:border-l md:border-line-soft md:pl-5\">\n        <span class=\"font-brand text-[9px] font-bold tracking-[0.14em] uppercase text-ink-3\">Legenda<\u002Fspan>\n        <div class=\"grid grid-cols-2 gap-x-4 gap-y-1.5\">\n          <span class=\"inline-flex items-center gap-1.5 text-[11px] text-ink-2\"><span class=\"w-3.5 h-3.5 rounded-sm border border-white\" style=\"background:#FDF6E8\"><\u002Fspan>Programadas<\u002Fspan>\n          <span class=\"inline-flex items-center gap-1.5 text-[11px] text-ink-2\"><span class=\"w-3.5 h-3.5 rounded-sm border border-white\" style=\"background:#E6F3EA\"><\u002Fspan>Baixadas<\u002Fspan>\n          <span class=\"inline-flex items-center gap-1.5 text-[11px] text-ink-2\"><span class=\"w-2 h-2 rounded-full bg-[#D6362B]\"><\u002Fspan>Há pendências<\u002Fspan>\n          <span class=\"inline-flex items-center gap-1.5 text-[11px] text-ink-2\"><span class=\"w-3.5 h-3.5 rounded-sm border-2 border-navy bg-white\"><\u002Fspan>Hoje<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"bg-card border border-line rounded-lg p-5 reveal relative overflow-hidden\">\n    <img src=\"assets/symbol-laranja.png\" class=\"absolute -right-10 -top-10 w-44 opacity-[0.05] pointer-events-none\" alt=\"\">\n    <div class=\"flex items-center gap-2.5 mb-4 relative\">\n      <span class=\"w-1 h-3.5 bg-orange rounded-sm\"><\u002Fspan>\n      <span class=\"font-brand text-[15px] font-bold text-navy\">Dezembro 2024<\u002Fspan>\n      <span class=\"font-brand tnum text-[11px] font-semibold text-ink-3 ml-2\">8 equipamentos · 2 áreas<\u002Fspan>\n    <\u002Fdiv>\n    ${PLANO_AREAS.map(a=>`<div class=\"mb-5 relative\">\n      <div class=\"inline-flex items-center gap-2 mb-2.5\">\n        <i data-lucide=\"map-pin\" class=\"w-3.5 h-3.5 text-orange\"><\u002Fi>\n        <span class=\"font-brand text-[12px] font-bold tracking-wide uppercase text-orange-deep\">Área: ${a.area}<\u002Fspan>\n      <\u002Fdiv>\n      ${a.equip.map(equipBlock).join('')}\n    <\u002Fdiv>`).join('')}\n  <\u002Fdiv>`;\n}\n\n/* ============ BACKLOG GUT (matriz/infográfico) ============ */\nconst BACKLOG_FULL=[\n  {titulo:'Infiltração na fachada — causa raiz desconhecida',score:125,prioridade:'critica',condominio:'Ed. Horizonte',g:5,u:5,t:5},\n  {titulo:'Quadro elétrico de área comum sem proteção',score:80,prioridade:'alta',condominio:'Res. Alamedas',g:5,u:4,t:4},\n  {titulo:'Elevador — manutenção atrasada há 30 dias',score:60,prioridade:'alta',condominio:'Cond. Primavera',g:4,u:5,t:3},\n  {titulo:'Bomba de incêndio sem teste semestral',score:48,prioridade:'alta',condominio:'Ed. Central Park',g:4,u:4,t:3},\n  {titulo:'Corrosão em guarda-corpo da sacada',score:36,prioridade:'media',condominio:'Cond. Jardins',g:3,u:3,t:4},\n  {titulo:'Iluminação de emergência intermitente',score:27,prioridade:'media',condominio:'Res. Vila Verde',g:3,u:3,t:3},\n  {titulo:'Pintura descascando no hall social',score:12,prioridade:'baixa',condominio:'Res. Alamedas',g:2,u:2,t:3},\n  {titulo:'Vazamento lento em registro do jardim',score:8,prioridade:'baixa',condominio:'Cond. Primavera',g:2,u:2,t:2},\n];\nfunction gutMatrix(){\n  // 5x5: linhas Gravidade 5..1, colunas Urgência 1..5; célula colorida por intensidade; bolhas = itens\n  const heat=(g,u)=>{const p=g*u; if(p>=20)return '#FBE3D6'; if(p>=12)return '#FDF0DD'; if(p>=6)return '#FBF6E9'; return '#F1F4F0';};\n  let cells='';\n  for(let g=5;g>=1;g--){\n    cells+=`<div class=\"flex items-center\"><span class=\"font-brand tnum text-[10px] font-bold text-ink-3 w-4 text-center\">${g}<\u002Fspan>`;\n    for(let u=1;u<=5;u++){\n      const items=BACKLOG_FULL.filter(it=>it.g===g&&it.u===u);\n      cells+=`<div class=\"relative flex items-center justify-center\" style=\"width:46px;height:46px;background:${heat(g,u)};border:1px solid #fff\">\n        ${items.map(it=>{const p=PRIO_MAP[it.prioridade];const sz=10+it.t*3;return `<span class=\"rounded-full flex items-center justify-center text-white font-brand tnum font-bold shadow-sm\" style=\"width:${sz}px;height:${sz}px;background:${p.c};font-size:8px\" title=\"${it.titulo}\">${it.t}<\u002Fspan>`}).join('')}\n      <\u002Fdiv>`;\n    }\n    cells+=`<\u002Fdiv>`;\n  }\n  cells+=`<div class=\"flex\"><span class=\"w-4\"><\u002Fspan>${[1,2,3,4,5].map(u=>`<span class=\"font-brand tnum text-[10px] font-bold text-ink-3 text-center\" style=\"width:46px\">${u}<\u002Fspan>`).join('')}<\u002Fdiv>`;\n  return `<div class=\"inline-block\">\n    <div class=\"flex\">\n      <div class=\"flex items-center\"><span class=\"font-brand text-[9px] font-bold tracking-widest uppercase text-ink-3\" style=\"writing-mode:vertical-rl;transform:rotate(180deg)\">Gravidade<\u002Fspan><\u002Fdiv>\n      <div>${cells}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"text-center font-brand text-[9px] font-bold tracking-widest uppercase text-ink-3 mt-1\" style=\"margin-left:16px\">Urgência →<\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction backlogItemRow(it,i){\n  const p=PRIO_MAP[it.prioridade];const max=125;const pct=Math.round(it.score/max*100);\n  return `<div class=\"flex items-center gap-4 px-5 py-3 border-b border-line-soft hover:bg-paper/70 transition-colors reveal\" style=\"animation-delay:${i*30}ms\">\n    <span class=\"font-brand tnum text-[11px] font-bold text-ink-4 w-5\">${String(i+1).padStart(2,'0')}<\u002Fspan>\n    <div class=\"flex-1 min-w-0\">\n      <p class=\"text-[13px] font-semibold text-ink truncate\">${it.titulo}<\u002Fp>\n      <p class=\"text-[11.5px] text-ink-3 mt-0.5\">${it.condominio}<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"flex items-center gap-1 font-brand tnum text-[10px] text-ink-2 shrink-0\">\n      <span class=\"px-1.5 py-0.5 rounded bg-line-soft\" title=\"Gravidade\">G${it.g}<\u002Fspan>\n      <span class=\"px-1.5 py-0.5 rounded bg-line-soft\" title=\"Urgência\">U${it.u}<\u002Fspan>\n      <span class=\"px-1.5 py-0.5 rounded bg-line-soft\" title=\"Tendência\">T${it.t}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"hidden lg:flex items-center gap-2 w-36 shrink-0\">\n      <div class=\"flex-1 h-1.5 rounded-full bg-line-soft overflow-hidden\"><div class=\"h-full rounded-full\" style=\"width:${pct}%;background:${p.c}\"><\u002Fdiv><\u002Fdiv>\n      <span class=\"font-brand tnum text-[14px] font-bold w-7 text-right\" style=\"color:${p.c}\">${it.score}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction backlogPage(){\n  const dist=[{l:'Crítica',n:1,c:'#D6362B'},{l:'Alta',n:3,c:'#E8731B'},{l:'Média',n:2,c:'#F4A300'},{l:'Baixa',n:2,c:'#B4B6BE'}];\n  const tot=dist.reduce((a,b)=>a+b.n,0);\n  return `${pageHeader('Operação · Priorização','Backlog GUT','Matriz de priorização Gravidade × Urgência × Tendência — 8 itens em aberto.',btnGhost('sliders-horizontal','Filtros')+btnPrimary('plus','Novo item'))}\n  <div class=\"grid grid-cols-1 lg:grid-cols-[auto_1fr] gap-5\">\n    <div class=\"bg-card border border-line rounded-lg p-5 reveal\">\n      <div class=\"flex items-center gap-2.5 mb-4\">${'<span class=\"w-1 h-3.5 bg-orange rounded-sm\"><\u002Fspan><span class=\"font-brand text-[12px] font-bold tracking-[0.16em] uppercase text-navy\">Matriz GUT<\u002Fspan>'}<\u002Fdiv>\n      ${gutMatrix()}\n      <div class=\"flex items-center gap-3 mt-4 pt-4 border-t border-line-soft flex-wrap\">\n        ${dist.map(d=>`<span class=\"inline-flex items-center gap-1.5 text-[11px] font-semibold text-ink-2\"><span class=\"w-2.5 h-2.5 rounded-full\" style=\"background:${d.c}\"><\u002Fspan>${d.l}<\u002Fspan>`).join('')}\n        <span class=\"text-[10.5px] text-ink-3 ml-auto\">Bolha = tendência (T)<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"flex flex-col gap-5\">\n      <div class=\"bg-card border border-line rounded-lg p-5 reveal\">\n        <div class=\"flex items-center justify-between mb-3\"><span class=\"font-brand text-[12px] font-bold tracking-[0.16em] uppercase text-navy flex items-center gap-2.5\"><span class=\"w-1 h-3.5 bg-orange rounded-sm\"><\u002Fspan>Distribuição por prioridade<\u002Fspan><span class=\"font-brand tnum text-[11px] text-ink-3\">${tot} itens<\u002Fspan><\u002Fdiv>\n        <div class=\"flex h-3 rounded-full overflow-hidden\">${dist.map(d=>`<div style=\"width:${d.n/tot*100}%;background:${d.c}\" title=\"${d.l}\"><\u002Fdiv>`).join('')}<\u002Fdiv>\n        <div class=\"grid grid-cols-4 gap-3 mt-4\">${dist.map(d=>`<div><div class=\"font-brand tnum text-[24px] font-bold leading-none\" style=\"color:${d.c}\">${d.n}<\u002Fdiv><div class=\"text-[11px] text-ink-3 mt-1\">${d.l}<\u002Fdiv><\u002Fdiv>`).join('')}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bg-card border border-line rounded-lg overflow-hidden reveal flex-1\">\n        <div class=\"px-5 py-4 border-b border-line-soft flex items-center justify-between\">${sectionLabel('Itens priorizados')}<span class=\"font-brand tnum text-[11px] text-ink-3\">ordenado por score<\u002Fspan><\u002Fdiv>\n        <div>${BACKLOG_FULL.map(backlogItemRow).join('')}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ============ COCKPIT (gráficos + infográficos) ============ */\nfunction lineChart(values,w,h,color,fill){\n  const max=100,min=60,pad=4;\n  const xs=(i)=>pad+i*((w-pad*2)/(values.length-1));\n  const ys=(v)=>h-pad-((v-min)/(max-min))*(h-pad*2);\n  const pts=values.map((v,i)=>`${xs(i).toFixed(1)},${ys(v).toFixed(1)}`).join(' ');\n  const area=`${pad},${h-pad} ${pts} ${(w-pad)},${h-pad}`;\n  return `<svg viewBox=\"0 0 ${w} ${h}\" preserveAspectRatio=\"none\" class=\"w-full\" style=\"height:${h}px\">\n    <polygon points=\"${area}\" fill=\"${fill}\"/>\n    <polyline points=\"${pts}\" fill=\"none\" stroke=\"${color}\" stroke-width=\"2.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\" vector-effect=\"non-scaling-stroke\"/>\n  <\u002Fsvg>`;\n}\nfunction donut(segs,size){\n  const tot=segs.reduce((a,b)=>a+b.v,0);let acc=0;const stops=[];\n  segs.forEach(s=>{const a=acc/tot*100,b=(acc+s.v)/tot*100;stops.push(`${s.c} ${a.toFixed(1)}% ${b.toFixed(1)}%`);acc+=s.v;});\n  const hole=size*0.56;\n  return `<div class=\"relative shrink-0\" style=\"width:${size}px;height:${size}px;border-radius:50%;background:conic-gradient(${stops.join(',')})\">\n    <div class=\"absolute rounded-full bg-card flex flex-col items-center justify-center\" style=\"inset:${(size-hole)/2}px\">\n      <span class=\"font-brand tnum font-extrabold text-navy leading-none\" style=\"font-size:${size*0.18}px\">${tot}<\u002Fspan>\n      <span class=\"font-brand font-semibold text-ink-3\" style=\"font-size:${size*0.06}px;letter-spacing:.1em\">OS / MÊS<\u002Fspan>\n    <\u002Fdiv><\u002Fdiv>`;\n}\nfunction gauge(pct,size){\n  const r=size/2-12,cx=size/2,cy=size/2,C=Math.PI*r;const len=pct/100*C;\n  return `<svg viewBox=\"0 0 ${size} ${size/2+12}\" style=\"width:${size}px\">\n    <path d=\"M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}\" fill=\"none\" stroke=\"#EDEAE2\" stroke-width=\"14\" stroke-linecap=\"round\"/>\n    <path d=\"M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}\" fill=\"none\" stroke=\"#E8731B\" stroke-width=\"14\" stroke-linecap=\"round\" stroke-dasharray=\"${len.toFixed(1)} ${C.toFixed(1)}\"/>\n    <text x=\"${cx}\" y=\"${cy-6}\" text-anchor=\"middle\" class=\"font-brand\" style=\"font-size:26px;font-weight:800;fill:#1C2748\">${pct}%<\u002Ftext>\n    <text x=\"${cx}\" y=\"${cy+8}\" text-anchor=\"middle\" style=\"font-size:9px;letter-spacing:.1em;fill:#8C8F9B;font-weight:600\">SLA NO PRAZO<\u002Ftext>\n  <\u002Fsvg>`;\n}\nfunction barsH(data){\n  const max=Math.max(...data.map(d=>d.v));\n  return data.map(d=>`<div class=\"flex items-center gap-3\">\n    <span class=\"text-[12px] text-ink-2 w-28 truncate text-right\">${d.l}<\u002Fspan>\n    <div class=\"flex-1 h-5 rounded bg-line-soft overflow-hidden\"><div class=\"h-full rounded flex items-center justify-end pr-2\" style=\"width:${Math.max(d.v/max*100,12)}%;background:${d.c}\"><span class=\"font-brand tnum text-[10px] font-bold text-white\">${d.v}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>`).join('');\n}\nconst CICLO=[{l:'Inspeção',ic:'search'},{l:'Diagnóstico',ic:'clipboard-list'},{l:'Plano',ic:'calendar-range'},{l:'Execução',ic:'wrench'},{l:'Validação',ic:'shield-check'}];\nfunction cockpitPage(){\n  const slaTrend=[78,81,79,84,85,87];\n  const meses=['Jul','Ago','Set','Out','Nov','Dez'];\n  const cats=[{l:'Corretiva',v:32,c:'#E8731B'},{l:'Preventiva',v:41,c:'#1C2748'},{l:'Inspeção',v:18,c:'#F4A300'}];\n  const cond=[{l:'Cond. Primavera',v:24,c:'#1C2748'},{l:'Res. Alamedas',v:19,c:'#2B375E'},{l:'Ed. Central Park',v:16,c:'#E8731B'},{l:'Cond. Jardins',v:13,c:'#F4A300'},{l:'Res. Vila Verde',v:9,c:'#B4B6BE'}];\n  return `${pageHeader('Gestão · Visão consolidada','Cockpit de Operações','Indicadores de SLA, volume e produtividade — dezembro/2024.',btnGhost('calendar','Dezembro 2024')+btnGhost('download','Exportar'))}\n  <div class=\"grid grid-cols-1 lg:grid-cols-3 gap-5\">\n    <!-- SLA trend -->\n    <div class=\"lg:col-span-2 bg-card border border-line rounded-lg p-5 reveal\">\n      <div class=\"flex items-center justify-between mb-4\">${sectionLabel('SLA no prazo · 6 meses')}<span class=\"inline-flex items-center gap-1 font-brand tnum text-[12px] font-bold text-[#1E8E45]\"><i data-lucide=\"trending-up\" class=\"w-3.5 h-3.5\"><\u002Fi>+9pp<\u002Fspan><\u002Fdiv>\n      ${lineChart(slaTrend,560,150,'#E8731B','rgba(232,115,27,0.10)')}\n      <div class=\"flex justify-between mt-1 px-1\">${meses.map(m=>`<span class=\"font-brand text-[10px] text-ink-3\">${m}<\u002Fspan>`).join('')}<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Gauge -->\n    <div class=\"bg-card border border-line rounded-lg p-5 reveal flex flex-col\">\n      ${sectionLabel('Meta do mês')}\n      <div class=\"flex-1 flex items-center justify-center\">${gauge(87,200)}<\u002Fdiv>\n      <div class=\"flex items-center justify-between text-[11px] text-ink-3 pt-3 border-t border-line-soft\"><span>Meta: <b class=\"text-ink-2 tnum\">90%<\u002Fb><\u002Fspan><span>Faltam <b class=\"text-orange tnum\">3pp<\u002Fb><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Donut categorias -->\n    <div class=\"bg-card border border-line rounded-lg p-5 reveal\">\n      ${sectionLabel('OS por categoria')}\n      <div class=\"flex items-center gap-4 mt-3\">\n        ${donut(cats,140)}\n        <div class=\"flex flex-col gap-2.5\">${cats.map(c=>`<div class=\"flex items-center gap-2\"><span class=\"w-2.5 h-2.5 rounded-sm\" style=\"background:${c.c}\"><\u002Fspan><span class=\"text-[12px] text-ink-2 flex-1\">${c.l}<\u002Fspan><span class=\"font-brand tnum text-[13px] font-bold text-navy\">${c.v}<\u002Fspan><\u002Fdiv>`).join('')}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Bars condomínio -->\n    <div class=\"lg:col-span-2 bg-card border border-line rounded-lg p-5 reveal\">\n      <div class=\"mb-4\">${sectionLabel('OS por condomínio · top 5')}<\u002Fdiv>\n      <div class=\"flex flex-col gap-2.5\">${barsH(cond)}<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Infográfico ciclo de manutenção (símbolo) -->\n    <div class=\"lg:col-span-3 bg-navy-deep rounded-lg p-6 reveal relative overflow-hidden\">\n      <img src=\"assets/symbol-offwhite.png\" class=\"absolute right-6 top-1/2 -translate-y-1/2 w-40 opacity-10 pointer-events-none hidden md:block\" alt=\"\">\n      <div class=\"flex items-center gap-2.5 mb-5 relative\">\n        <span class=\"w-1 h-3.5 bg-orange rounded-sm\"><\u002Fspan>\n        <span class=\"font-brand text-[12px] font-bold tracking-[0.16em] uppercase text-amber\">Ciclo de Manutenção Preventiva<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"flex items-center gap-2 md:gap-4 relative flex-wrap\">\n        ${CICLO.map((c,i)=>`<div class=\"flex items-center gap-2 md:gap-4\">\n          <div class=\"flex flex-col items-center gap-2 min-w-[88px]\">\n            <div class=\"w-12 h-12 rounded-xl bg-white/[0.06] border border-white/10 flex items-center justify-center\"><i data-lucide=\"${c.ic}\" class=\"w-5 h-5 text-orange\"><\u002Fi><\u002Fdiv>\n            <span class=\"font-brand text-[11px] font-bold text-white text-center\">${c.l}<\u002Fspan>\n            <span class=\"font-brand tnum text-[9px] font-bold text-paper/40\">0${i+1}<\u002Fspan>\n          <\u002Fdiv>\n          ${i<CICLO.length-1?'<i data-lucide=\"arrow-right\" class=\"w-4 h-4 text-orange/60 shrink-0\"><\u002Fi>':'<i data-lucide=\"refresh-cw\" class=\"w-4 h-4 text-orange shrink-0\"><\u002Fi>'}\n        <\u002Fdiv>`).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nconst PCM_PAGES={painel:dashboard,ordens:ordensPage,plano:planoPage,backlog:backlogPage,cockpit:cockpitPage};\n\nfunction render(){\n  const modulo=MODULOS.find(m=>m.id===active);\n  document.getElementById('app').innerHTML=`\n  <!-- Sidebar -->\n  <aside class=\"w-[228px] shrink-0 bg-navy-deep flex flex-col relative overflow-hidden\">\n    <img src=\"assets/symbol-offwhite.png\" class=\"absolute -left-12 bottom-24 w-48 opacity-[0.045] pointer-events-none\" alt=\"\">\n    <div class=\"px-5 pt-6 pb-5 relative\">\n      <img src=\"assets/logo-h-offwhite.png\" class=\"h-[26px] w-auto\" alt=\"Sinérgica\">\n      <div class=\"flex items-center gap-1.5 mt-3 pl-0.5\">\n        <span class=\"w-1 h-1 rounded-full bg-orange\"><\u002Fspan>\n        <span class=\"font-brand text-[9px] font-bold tracking-[0.22em] uppercase text-paper/45\">Sistema Operacional<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"h-px bg-navy-line/50 mx-5\"><\u002Fdiv>\n    <nav class=\"flex-1 overflow-y-auto px-3 py-4 space-y-5 no-scrollbar relative\">\n      ${active==='pcm' ? PCM_NAV.map(g=>`<div>\n        <p class=\"px-2.5 font-brand text-[10px] font-bold text-paper/35 uppercase tracking-[0.18em] mb-2\">${g.titulo}<\u002Fp>\n        <div class=\"space-y-0.5\">\n        ${g.items.map(it=>{const on=it.page===pcmPage;return `<button data-page=\"${it.page}\" class=\"navbtn w-full flex items-center gap-3 pl-3 pr-2.5 py-2 rounded-md text-[13px] transition-all relative ${on?'bg-white/[0.07] text-white font-semibold':'text-paper/55 hover:bg-white/[0.04] hover:text-paper/90'}\">\n          ${on?'<span class=\\\"absolute left-0 top-1.5 bottom-1.5 w-[3px] rounded-r bg-orange\\\"><\u002Fspan>':''}\n          <i data-lucide=\"${it.icon}\" class=\"w-[17px] h-[17px] shrink-0 ${on?'text-orange':''}\"><\u002Fi>\n          <span class=\"truncate flex-1 text-left\">${it.label}<\u002Fspan>\n          ${it.badge?`<span class=\"font-brand tnum text-[10px] font-bold px-1.5 py-0.5 rounded ${on?'bg-orange text-white':'bg-white/[0.08] text-paper/60'}\">${it.badge}<\u002Fspan>`:''}<\u002Fbutton>`}).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>`).join('') : `<div class=\"px-3 pt-6 text-center\"><p class=\"text-[12px] text-paper/45 leading-relaxed\">A navegação deste módulo<br>aparece quando ele for construído.<\u002Fp><\u002Fdiv>`}\n    <\u002Fnav>\n    <div class=\"px-3 py-3 relative\">\n      <div class=\"h-px bg-navy-line/50 mb-3 mx-2\"><\u002Fdiv>\n      <button class=\"w-full flex items-center gap-3 pl-3 pr-2.5 py-2 rounded-md text-[13px] text-paper/55 hover:bg-white/[0.04] hover:text-paper/90 transition\"><i data-lucide=\"settings\" class=\"w-[17px] h-[17px]\"><\u002Fi>Configurações<\u002Fbutton>\n      <button class=\"w-full flex items-center gap-3 pl-3 pr-2.5 py-2 rounded-md text-[13px] text-paper/55 hover:bg-white/[0.04] hover:text-paper/90 transition\"><i data-lucide=\"log-out\" class=\"w-[17px] h-[17px]\"><\u002Fi>Sair<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- Main -->\n  <div class=\"flex-1 flex flex-col min-w-0 overflow-hidden\">\n    <header class=\"bg-card border-b border-line shrink-0\">\n      <div class=\"flex items-stretch gap-0 px-3 overflow-x-auto no-scrollbar\">\n        ${MODULOS.map(m=>{const a=m.id===active;return `<button data-mod=\"${m.id}\" class=\"modtab group flex items-center gap-2.5 px-3.5 py-3 whitespace-nowrap border-b-2 transition-colors shrink-0 ${a?'border-orange':'border-transparent hover:border-line'}\">\n          <i data-lucide=\"${m.icon}\" class=\"w-[18px] h-[18px] ${a?'text-orange':'text-ink-3 group-hover:text-navy'}\"><\u002Fi>\n          <div class=\"text-left\">\n            <div class=\"text-[12.5px] font-semibold leading-none ${a?'text-navy':'text-ink-2 group-hover:text-navy'}\">${m.label}<\u002Fdiv>\n            <div class=\"text-[9.5px] tracking-wide uppercase leading-none mt-1 ${a?'text-orange/80':'text-ink-4'}\">${m.sub}<\u002Fdiv>\n          <\u002Fdiv><\u002Fbutton>`}).join('')}\n        <div class=\"ml-auto pl-4 flex items-center gap-2 shrink-0\">\n          <button class=\"w-9 h-9 rounded-md flex items-center justify-center text-ink-3 hover:bg-paper hover:text-navy transition relative\"><i data-lucide=\"search\" class=\"w-[18px] h-[18px]\"><\u002Fi><\u002Fbutton>\n          <button class=\"w-9 h-9 rounded-md flex items-center justify-center text-ink-3 hover:bg-paper hover:text-navy transition relative\"><i data-lucide=\"bell\" class=\"w-[18px] h-[18px]\"><\u002Fi><span class=\"absolute top-2 right-2.5 w-1.5 h-1.5 rounded-full bg-orange ring-2 ring-card\"><\u002Fspan><\u002Fbutton>\n          <div class=\"w-px h-6 bg-line mx-1\"><\u002Fdiv>\n          <div class=\"flex items-center gap-2.5\">\n            <div class=\"text-right hidden md:block\"><p class=\"text-[12.5px] font-bold text-navy leading-tight\">${user.name}<\u002Fp><p class=\"text-[10.5px] text-ink-3 leading-tight\">${user.role}<\u002Fp><\u002Fdiv>\n            <div class=\"w-9 h-9 rounded-md bg-navy flex items-center justify-center text-paper font-brand text-[13px] font-bold\">${initials}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n    <main class=\"flex-1 overflow-y-auto p-6\">\n      ${active==='pcm' ? PCM_PAGES[pcmPage]() : emConstrucao(modulo)}\n    <\u002Fmain>\n  <\u002Fdiv>`;\n  document.querySelectorAll('.modtab').forEach(b=>b.onclick=()=>{active=b.dataset.mod;render();const m=document.querySelector('main');if(m)m.scrollTop=0;});\n  document.querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>{pcmPage=b.dataset.page;render();const m=document.querySelector('main');if(m)m.scrollTop=0;});\n  document.querySelectorAll('.osfilter').forEach(b=>b.onclick=()=>{filtroOS=b.dataset.osf;render();});\n  if(window.lucide) lucide.createIcons();\n}\n<\u002Fscript>\n<script src=\"62f20b59-ed3d-4ae5-ae0c-ed7dfcafd6d8\"><\u002Fscript>\n<script>render();<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
