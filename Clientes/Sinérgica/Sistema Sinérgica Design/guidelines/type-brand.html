<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-brand);background:var(--sin-navy);padding:22px 24px;color:#fff}
  .wm{font-size:40px;font-weight:700;letter-spacing:.02em}
  .wm em{font-style:normal;background:var(--sin-gradient);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tagline{font-size:12px;letter-spacing:.28em;color:var(--sin-ink-on-dark-2);text-transform:uppercase;margin-top:6px}
  .label{display:inline-block;margin-top:14px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--sin-amber);border:1px solid rgba(247,166,0,.4);border-radius:999px;padding:5px 12px}
</style></head><body>
  <div class="wm">SIN<em>É</em>RGICA</div>
  <div class="tagline">Manutenções Patrimoniais</div>
  <span class="label">Saira · Label 0.16em</span>
</body></html>
