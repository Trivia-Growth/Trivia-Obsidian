<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--sin-offwhite);padding:18px}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .chip{height:78px}
  .meta{padding:8px 10px;background:#fff}
  .name{font-size:13px;font-weight:600;color:var(--sin-ink)}
  .hex{font-size:12px;color:var(--sin-ink-3);font-family:var(--font-brand);letter-spacing:.04em}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--sin-navy)"></div><div class="meta"><div class="name">Navy</div><div class="hex">#202B59</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sin-navy-deep)"></div><div class="meta"><div class="name">Navy Deep</div><div class="hex">#161E40</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sin-navy-soft)"></div><div class="meta"><div class="name">Navy Soft</div><div class="hex">#2E3C70</div></div></div>
  </div>
</body></html>
