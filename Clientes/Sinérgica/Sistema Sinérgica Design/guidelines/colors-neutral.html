<!-- @dsCard group="Cores" viewport="700x150" name="Neutros" subtitle="Off-white quente, superfícies e texto" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--sin-mist);padding:18px}
  .row{display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .chip{height:64px}
  .meta{padding:7px 9px;background:#fff}
  .name{font-size:12px;font-weight:600;color:var(--sin-ink)}
  .hex{font-size:11px;color:var(--sin-ink-3);font-family:var(--font-brand)}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--sin-offwhite);border:1px solid var(--sin-line)"></div><div class="meta"><div class="name">Off-white</div><div class="hex">#F8F7F5</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sin-mist)"></div><div class="meta"><div class="name">Mist</div><div class="hex">#EDF0F3</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sin-line)"></div><div class="meta"><div class="name">Line</div><div class="hex">#E2E1DC</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sin-ink-2)"></div><div class="meta"><div class="name">Ink 2</div><div class="hex">#4A5168</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sin-ink)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#1B2138</div></div></div>
  </div>
</body></html>
