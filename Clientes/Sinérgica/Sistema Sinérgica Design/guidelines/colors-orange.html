<!-- @dsCard group="Cores" viewport="700x190" name="Laranja & Gradiente" subtitle="Energia da marca — engrenagem e destaques" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--sin-offwhite);padding:18px}
  .row{display:flex;gap:14px;margin-bottom:14px}
  .sw{flex:1;border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .chip{height:64px}
  .meta{padding:8px 10px;background:#fff}
  .name{font-size:13px;font-weight:600;color:var(--sin-ink)}
  .hex{font-size:12px;color:var(--sin-ink-3);font-family:var(--font-brand);letter-spacing:.04em}
  .grad{height:74px;border-radius:var(--r-md);display:flex;align-items:flex-end;padding:10px 14px;box-shadow:var(--shadow-sm)}
  .grad span{font-family:var(--font-brand);font-size:12px;color:#fff;letter-spacing:.04em}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--sin-orange)"></div><div class="meta"><div class="name">Orange</div><div class="hex">#EF7E25</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sin-orange-deep)"></div><div class="meta"><div class="name">Orange Deep</div><div class="hex">#E06A14</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sin-amber)"></div><div class="meta"><div class="name">Amber</div><div class="hex">#F7A600</div></div></div>
  </div>
  <div class="grad" style="background:var(--sin-gradient)"><span>--sin-gradient · 110° · #EE7B22 → #F8A634</span></div>
</body></html>
