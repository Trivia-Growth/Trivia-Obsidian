<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--sin-offwhite);padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .cell{border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;height:84px;box-shadow:var(--shadow-sm)}
  .cell img{max-width:74%;max-height:56%}
  .light{background:#fff}
  .off{background:var(--sin-offwhite);border:1px solid var(--sin-line)}
  .navy{background:var(--sin-navy)}
  .grad{background:var(--sin-gradient)}
</style></head><body>
  <div class="cell light"><img src="../assets/logo-h-laranja.png" alt="Logo gradiente"></div>
  <div class="cell light"><img src="../assets/logo-h-azul.png" alt="Logo azul"></div>
  <div class="cell navy"><img src="../assets/logo-h-offwhite.png" alt="Logo off-white"></div>
  <div class="cell grad"><img src="../assets/logo-h-offwhite.png" alt="Logo off-white sobre gradiente"></div>
</body></html>
