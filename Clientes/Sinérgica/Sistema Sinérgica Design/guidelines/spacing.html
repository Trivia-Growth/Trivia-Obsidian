<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--sin-offwhite);padding:18px 20px;color:var(--sin-ink)}
  .scale{display:flex;align-items:flex-end;gap:10px;margin-bottom:16px}
  .u{background:var(--sin-gradient);border-radius:4px;width:26px}
  .u b{display:block;font-size:10px;color:var(--sin-ink-3);text-align:center;margin-top:5px;font-family:var(--font-brand)}
  .radii{display:flex;gap:12px}
  .r{flex:1;height:46px;background:var(--sin-navy);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-family:var(--font-brand)}
</style></head><body>
  <div class="scale">
    <div><div class="u" style="height:8px"></div><b>4</b></div>
    <div><div class="u" style="height:16px"></div><b>8</b></div>
    <div><div class="u" style="height:24px"></div><b>12</b></div>
    <div><div class="u" style="height:32px"></div><b>16</b></div>
    <div><div class="u" style="height:48px"></div><b>24</b></div>
    <div><div class="u" style="height:64px"></div><b>32</b></div>
    <div><div class="u" style="height:80px"></div><b>48</b></div>
  </div>
  <div class="radii">
    <div class="r" style="border-radius:8px">8</div>
    <div class="r" style="border-radius:14px">14</div>
    <div class="r" style="border-radius:20px">20</div>
    <div class="r" style="border-radius:28px">28</div>
    <div class="r" style="border-radius:999px">pill</div>
  </div>
</body></html>
