<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--sin-offwhite);padding:16px;display:flex;gap:14px}
  .cell{flex:1;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;height:150px;box-shadow:var(--shadow-sm)}
  .cell img{width:96px;height:96px;object-fit:contain}
  .light{background:#fff}
  .navy{background:var(--sin-navy)}
  .grad{background:var(--sin-gradient)}
  .mist{background:var(--sin-mist)}
</style></head><body>
  <div class="cell light"><img src="../assets/symbol-laranja.png" alt="Símbolo gradiente"></div>
  <div class="cell mist"><img src="../assets/symbol-azul.png" alt="Símbolo azul"></div>
  <div class="cell navy"><img src="../assets/symbol-offwhite.png" alt="Símbolo off-white"></div>
  <div class="cell grad"><img src="../assets/symbol-offwhite.png" alt="Símbolo off-white"></div>
</body></html>
