<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--sin-offwhite);padding:18px}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .chip{height:64px}
  .meta{padding:8px 10px;background:#fff}
  .name{font-size:13px;font-weight:600;color:var(--sin-ink)}
  .hex{font-size:12px;color:var(--sin-ink-3);font-family:var(--font-brand)}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--sin-success)"></div><div class="meta"><div class="name">Success</div><div class="hex">#2FAE4E</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sin-warning)"></div><div class="meta"><div class="name">Warning</div><div class="hex">#F7A600</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sin-danger)"></div><div class="meta"><div class="name">Danger</div><div class="hex">#E23B2E</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sin-info)"></div><div class="meta"><div class="name">Info</div><div class="hex">#2E3C70</div></div></div>
  </div>
</body></html>
