# Lefthook — orquestrador único dos gates de qualidade (substitui husky + lint-staged + ci-local).
# Um só arquivo define o que roda no commit, na mensagem e no push. Paralelo por padrão (rápido).
# Instala com `lefthook install` (roda no `npm install` via script prepare).
#
# Filosofia (ver PADRAO-DE-QUALIDADE.md):
#   • pre-commit  = LEVE, só arquivos staged — não trava o ritmo do commit.
#   • pre-push    = ESPELHO FIEL DA CI — a mesma bateria do pipeline, antes de o código sair.
#     `npm run ci:local` = `lefthook run pre-push`: hook e comando manual são a MESMA definição.
#   • CI real ainda é a prova final (gate com Docker/banco pode ser pulado local) → /validar checa `gh pr checks`.

# ─────────────────────────────────────────────────────────────────────────────
pre-commit:
  parallel: true
  commands:
    # Biome (lint + format) só nos arquivos staged — back e front, um tool só.
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css}"
      run: npx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true # re-staga o que o Biome corrigiu automaticamente

# ─────────────────────────────────────────────────────────────────────────────
commit-msg:
  commands:
    commitlint:
      run: npx --no -- commitlint --edit {1} # Conventional Commits obrigatório

# ─────────────────────────────────────────────────────────────────────────────
# pre-push = espelho da CI. Paralelo: você vê TODOS os vermelhos de uma vez, não um a um.
pre-push:
  parallel: true
  commands:
    esteira:
      run: node scripts/audit-esteira.mjs
    fidelidade:
      run: node scripts/eval-spec-fidelity.mjs
    mermaid:
      run: node scripts/validate-mermaid.mjs
    migrations:
      run: node scripts/lint-migrations.mjs # RLS-GRANT (custom) + Squawk se instalado
    lint:
      run: npx biome check .
    typecheck:
      run: npx tsc --noEmit
    arquitetura:
      run: npx depcruise src --config .dependency-cruiser.cjs
    testes:
      run: npm run test:coverage
    # Descomente quando o projeto tiver front/app (o gate entra sozinho no espelho da CI):
    # build:
    #   run: npm run build
    # e2e:
    #   run: npm run test:e2e
    # Secret scanning é best-effort local (o gate bloqueante é o da CI); só roda se instalado:
    gitleaks:
      run: gitleaks detect --source . --no-banner --redact --exit-code 1
      skip: # não trava o push de quem não tem o binário — a CI cobre
        - run: '! command -v gitleaks'
