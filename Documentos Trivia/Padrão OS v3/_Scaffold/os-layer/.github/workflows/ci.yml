name: CI (OS monorepo)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-os-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qualidade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # turbo precisa do histórico para calcular o "affected"
      # Sem `version:` aqui — o pnpm/action-setup lê o campo `packageManager` do package.json.
      # Declarar os dois (version no workflow + packageManager no json) faz a action abortar.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Gates da esteira SDD (no monorepo inteiro)
      - name: Auditoria da esteira
        run: pnpm run audit:esteira
      - name: Fidelidade spec→implementação
        run: pnpm run eval:spec

      # Gates de segurança (BLOQUEANTES)
      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dependências vulneráveis (runtime)
        run: pnpm audit --prod --audit-level=high
      - name: SAST (Semgrep — injection, crypto insegura, SSRF)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/default

      # Supply chain (perfil OS): árvore transitiva visível e revisada
      - name: Dependency review (bloqueia vuln alta+ em PR)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
      - name: SBOM (CycloneDX)
        run: pnpm dlx @cyclonedx/cdxgen -o sbom.json || echo "::warning::SBOM falhou (não bloqueante)"
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: ignore

      # Gates de código — só nos pacotes AFETADOS (turbo affected) para feedback rápido
      - name: Lint / typecheck / test (affected)
        run: pnpm turbo run lint typecheck test --filter="...[origin/${{ github.base_ref || 'main' }}]"

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Squawk (segurança de migration)
        uses: sbdchd/squawk-action@v2
        with:
          pattern: |
            db/migrations/*.sql
            supabase/migrations/*.sql
      # Convenções Trivia que o Squawk não cobre (RLS-GRANT semântico).
      - name: Convenções de migration (RLS-GRANT)
        run: node scripts/lint-migrations.mjs
