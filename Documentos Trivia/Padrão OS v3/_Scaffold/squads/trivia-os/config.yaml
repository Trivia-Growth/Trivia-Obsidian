# ═══════════════════════════════════════════════════════════════════════════════
# Squad: Trivia OS
# Domain: Padrão OS da Trivia — esteira SDD sobre os agentes Triviaiox
# Version: 3.3.0 (acompanha o Padrão OS)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Este squad NÃO redefine agentes nem toca no core do Triviaiox (.triviaiox-core/).
# Ele adapta os agentes existentes para produzir/consumir os artefatos canônicos da
# esteira SDD (spec/domain/design/tasks/product + ADR), conforme base/AGENTS.md.

squad:
  name: trivia-os
  display_name: "Trivia OS — Esteira SDD"
  version: "3.3.0"
  domain: "Spec-Driven Development sobre os agentes Triviaiox"
  description: |
    Camada da Trivia que faz os agentes Triviaiox seguirem o Padrão OS:
    artefato canônico único (SDD), gates executáveis, dois perfis (single-repo/OS),
    baseline de segurança por perfil e trilha de IA. Sem alterar o core do Triviaiox.
  keywords: [trivia, padrao-os, sdd, spec-driven, ddd, gates, supabase]
  created_at: "2026-06-22"
  updated_at: "2026-07-02"

# ─────────────────────────────────────────────────────────────────────────────
# Artefato canônico × agente (espelha base/AGENTS.md — fonte da verdade)
# ─────────────────────────────────────────────────────────────────────────────
artifact_ownership:
  product.md:  { produces: "@pm",          consumes: [todos] }
  spec.md:     { produces: "@pm",          consumes: [todos] }
  domain.md:   { produces: "@architect",   consumes: ["@dev", "@qa"] }
  design.md:   { produces: "@architect",   consumes: ["@dev", "@data-engineer", "@qa"] }
  tasks.md:    { produces: "@sm",          consumes: ["@dev", "@qa"] }
  adr:         { produces: "@architect",   consumes: [todos] }
  migrations:  { produces: "@data-engineer", consumes: ["@dev"] }

# A "story" do Triviaiox é VISÃO DE EXECUÇÃO derivada de tasks.md; o "epic" é a pasta
# specs/NNNN-<slug>/ — nenhum dos dois é artefato paralelo (base/AGENTS.md, tabela de equivalência).
story_policy:
  canonical_artifacts: true
  story_is_view_of: tasks.md
  epic_is: specs/NNNN-<slug>/
qa_gate_vocabulary: [PASS, CONCERNS, FAIL, WAIVED]

# ─────────────────────────────────────────────────────────────────────────────
# Skill (esteira) → agente dono
# ─────────────────────────────────────────────────────────────────────────────
skill_routing:
  /iniciar-projeto: "@pm"       # kickoff de projeto novo (orquestra a cadeia toda)
  /clarificar:   "@pm"
  /nova-feature: ["@sm", "@dev"]
  /validar:      "@qa"
  /revisao-adversarial: ["@qa", "@security"]   # tenta quebrar cada AC antes do PASS
  /revisar-pr:   "@qa"
  /auditar:      "@architect"
  /handoff:      any
  ia_features:   "@prompt-engineer"

# Autoridade exclusiva preservada do Triviaiox (não sobrescrever)
authority:
  git_push_pr_cicd: "@devops"   # exclusivo — aplicado pelo hook claude/hooks/enforce-git-push-authority.sh
